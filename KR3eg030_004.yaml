body:
  text: 卷四丁巳春二月初旬有何姓子患溫病初起舌即乾紅身次不支神情恍惚余診之曰此證感溫甚重十難救一非大劑雙解不能挽回遲則不治因病家曾患此證專信不疑遂順手治療得愈計服大黃一兩五錢膏黃芩連倍數不但正氣不虧抑且病起旬日儼如無病者然於以見溫病早得下藥之力其效之神速如此有張姓妻忽然寒戰戰後大笑笑甚即厥日暮至曉如此者數次邀余診之見其面赤壯熱頭痛如破心煩作麻胸背作脹舌苔白滑六脈沉數譫言神昏余曰此脈乃羊毛溫也方以大劑雙解治之其時同事數醫論證用藥咸同一轍藥後得利而嘔未止邪困上焦也連投三劑外行搓法毛出五色諸證漸平時又邀一醫診云乃肝風內動少陽受病方主溫膽白薇一法病家見其立方平穩停雙解而投是藥夜間前證復作次日仍以雙解投之漸平至弟五日惟自笑不已遂以加味太極丸加牛黃治之一服而諸證俱平竟護全愈干隆乙卯六月上浣豫診盛姓之子患羊毛溫半月診時脈證俱平每交午刻即心煩作麻不自知其所苦口內喃喃不已人即昏去交子即醒如是者三日詢及前診之醫皆以治溫之法治之今病未解者是溫邪感受原輕發之不暴治法雖當奈毛毒未化故延多日一挑擦即可愈也病家旋邀一老嫗挑之得毛如縷內服神解散是夜即安後以辛涼之藥清理上焦得愈夫羊毛本熱化耳得挑則毛去毛去則熱不留內級刺穴瀉熱之法岐伯已先得我心因內經之義引伸觸類可為治溫證之津粱亦可為後人之楷式丙辰夏四月有高姓之子患溫夾葷滯甚重中宮堵塞邪不易透邀豫診之初時病家頗不介意豫即囑感邪極重又夾葷滯將來發作非輕旋邀二醫公同商酌先開裡氣使邪有出路其時已服過溫燥散藥數劑矣而現在之證神煩舌赤胎黃口渴遂以大劑雙解疊進五六日去宿糞以鬥計壅滯雖開伏邪大作舌黑苔刺譫妄煩躁之勢疊現要之此狀因邪重夾食初病又投溫散未治萌蘖以致病勢猖獗如此再以增損大柴合犀羚梨汁蘆根等味黑胎漸退邪勢向衰豫等醫俱云幸有生機詎料病家信任不專另延他醫譖言疊進有云涼藥太過者擬理中法有云失表者擬達原法不知所服何劑而病勢更加沉困譫妄更增而醫又欲以涼下法治之苦病家譖言已入胸臆堅不肯服大黃群藥仍屬大劑清涼解毒拖延多日始安要之再得雙解二三劑則邪淨病已不致半途而廢又投溫燥以致病勢史重在病家執譖言只説前藥之非孰知後藥之誤此豫之得以生全者天意也非人力也又同時湯姓子患溫毒結於少陽陽明腮腫結硬齦潰出膿邀於診時已數日矣時寒熱交作人事不清苔黃舌赤豫即云此溫毒極重之證若不極早雙解逮至傷陰舌黑神昏則無救矣奈病家膽怯堅不肯服權與清化太極二三日宿糞略去而病勢未減言之至再始服雙解一帖尚未盡劑去宿糞甚多而身熱人事頓爽意欲再進此藥病家萬不肯服又延二日診時苔黑神昏豫即諄辭旋邀一醫一見此證即行涼下見病家堅執不服只得以加味太極丸加牛黃服後病勢亦減再進不允又延他醫乘機進譖而昏潰之病家在他醫前不述病之原委而只云豫辭言之過激致病者因驚致舌黑神昏有是理耶殊不知未進言前豫臨床診時早已神昏舌黑連叫不醒病家闔室環聽抑因驚致神昏耶抑因失治之神昏耶而後醫不知所進何藥終致不能起悲夫夫前此兩證有幸有不幸者雖屬天意亦由人事在高姓之病得雙解多劑後藥雖誤尚可挽回湯子之斃不斃於後藥而斃於前藥之不徹也丙辰夏溫證大行現證多有口不能言神情昏倦其證有愈有不愈如陳姓一子甫生數歲哭不出聲神情倦怠其家以為必敗置之於地者久矣病者與豫有姻誼邀豫往視豫見勢非全敗先投以加味太極繼與雙解而哭聲出人事安同時有陸兄婦歸寧母家一病即苔黃壯熱豫與一醫合診見勢甚重即與雙解延至三日口不能言舌乾胎刺病勢加劇豫詢及再四緣何似此重劑不得去病家人告以其母姑息每劑藥服不及半以致如此後延至七日內陷厥陰舌強脈微而斃要之溫邪者熱邪也不語者厥陰為熱邪所閉也夫傷寒傳足溫證傳手手厥陰為心包絡之經熱邪傷陰則厥陰心包內閉不但口不能言並且舌強拘攣神昏囊縮變態多端故早下以去邪則六腑通三焦暢不致陷入厥陰如陳氏子可為明臉也因循失治則變證甚速張氏婦亦良可慨夫更有失治如李翁之孫田翁之婦皆系溫邪內陷厥陰不語而逝又有陳姓妻七月中旬若發本證腳氣嘔吐阻厥邀一醫投以解暑和肝熄風之劑次日神識昏憒脈氣散亂舌硬不言四日而逝朱氏之子得挑得下數日而蘇是溫邪之治宜用力於未曾不語之先如待不語而急力挽回猶堪幾幸逮至不語數日而欲其語也不亦難哉甚矣治病於未然者其聖人之法歟有林姓患羊毛溫疹半月所服之藥初溫散繼養陰未曾攻下亦未曾挑放豫診時見其發狂自笑歌罵不休診其脈則沉數驗其舌則苔黑芒刺豫曰此證失下奈陰分已傷難任攻逐所幸者得前藥養陰尚未枯竭今據現證種種悉屬溫邪困伏三焦心包內閉發狂自笑最凶之候治法當以逐邪為主佐以養陰之味古人原有黃龍一方兩得其妙遂月之加牛黃犀角等藥是日得解自笑稍止外用挑法得羊毛縷縷胸次稍寬次日挨方仍用是藥令以蕎麥麵作團滾胸背間後復診一次狂笑熱勢稍輕舌雖未盡脈亦少和藥用輕劑攻邪佐以和法病家見凶勢已平率皆大意竟不延診孰知燎原之火雖去而余焰猶未熄也聞知數日不藥以致餘邪猖獗而斃可見餘邪不盡一分即為禍一分俗云星星之火能燒萬頃之柴籲可畏哉張公子丙辰年夏間闔室患溫者十餘人初病者伏邪甚重豫與一醫合訂清解攻下之方服之而愈越數日伊仲媳亦患溫邪豫與一醫視其一病胎即滿黃均云邪重直與神解加軍二日不愈病勢加劇豫曰溫邪之證得下藥而不解病反加重其故何也詢及再四詰旁人始知以其祖母姑息藥未即服交三日邪勢猖獗直犯厥陰神昏舌硬拘攣倔犟旋邀一醫看視同以大劑育陰化邪毫無一效逮至七日而殂皆由溫毒萌時未得藥力以致於此又一人一病即壯熱胎黃一醫初用九味羌活次用三消豫見勢劇投以雙解疊下數次病勢更劇知受邪太深病家自云似此酷毒若不放手攻擊勢難救援是以醫膽倍壯硝黃膏連猛進舌黑神昏俱症漸退嗣後轉瘧日作逮至月餘而痊此時又一患溫者一醫以溫散之劑七日而殂可見溫邪之證得能早下使表裡通暢十全八九遲下先下十難全半嗚呼大命雖有天定醫藥豈可混施此所謂君子言理不言數也吳氏子患溫邪之證他醫謂暑濕痰滯藥用發表溫消之劑逮至二句外諸證更劇始延豫診視豫察其胎黑唇焦舌紫鼻煤身熱未退腹脹加鼓種種病狀悉屬溫邪困郁未經宣泄且從前所服之藥半屬辛溫夫溫邪本易灼陰又加燥劑陰分愈竭邪伏更深法在難治不得已擬大復蘇飲滋培陰氣加味太極丸滌蕩熱邪服後諸證少減更以雙解散加養陰之藥下之連投數劑熱象漸平改用養陰化熱之劑越數日肛門腫痛大解欲便不能豫知其下焦熱結陰液虧涸不能滋潤之故遂易大劑潤腸藥內加肉蓯蓉四錢峻補真陰一劑下燥糞數十枚腹脹滿消竟獲成功此證設首用清解何至此極以見不明溫熱治法誤以風寒混治其失有如此者楊姓年二十乙卯年間忽然右半不仁舌強不語神昏諸醫以中風受寒治之罔效延豫診視豫診其脈象沉數舌黃面垢外雖不熱內現口渴便閉神昏不語種種形證豫曰此證全系溫邪內伏非中風也夫中風脈應浮緩無口渴便閉之證況年力富強中風之事亦少據脈證相參端是溫厲之氣由里達表自陰分發出陽分四肢為諸陽之本不仁者溫邪傷陰陽氣未宣之象也偏於右者右為陰男子不足於陰也舌強神呆者少陰之脈循舌木蓋其人少陰素虧故溫邪易亂其神明觀冬不藏精春必病溫是其明驗他治法當急下以存陰若待津涸陰亡幾無濟矣於是以大劇硝黃下十餘次彼延二醫合診亦主此法後舌始轉音熱象始作繼得養陰化熱收功使非辨別精細以中風之法治之不幾誤耶金姓六月間患溫初病時早起食麵蛋午食葷膩午即舌白神昏譫妄胸悶頭脹脈伏面色垢暗勢極危篤豫知其溫邪極重非速進攻下不可投以雙解數劑服後毫不應手其勢臾甚豫急令挑放挑出羊毛無數仍投雙解一服即得大解徹行人事漸清連進攻逐之品約十餘劑熱象方減後轉瘧證以小柴養陰調理而安志此以見溫邪極重者若不先為挑放雖有對證之藥亦難取效也七月伊母患痢兼口乾咽燥胸悶以神砂丸蕎麥麵搓之得毛如許照溫邪治痢隨手而起朱叟年逾七旬素無疾苦乙卯四月中旬午後方食糕點忽然煩躁壯熱人事迷亂勢頗危殆延余診視余念其舌色乾黑臃象洪大煩渴譫語知溫邪驟發兼夾痰滯壅遏極重之候擬雙解救之連投三劑熱象少滅但舌黑而潤人事昏沉如故更加厄逆六脈無力此陰竭之象雙解不中與也急以歸氣治之一劑厄止神清諸證悉退後與和劑而愈彼不守禁忌甫愈三日即食糕肉無數以致餘邪復作後以清解消滯之品始獲成功噫前以涼下驅邪後即以甘溫扶正轉丸之技固不可與膠柱者同日語也金姓者鄉間人也據云客歲秋間患溫證瘧痢迭至仲冬方愈服過硝黃十有餘兩今春間午後忽腹大痛惡寒頭疼自利脈沉口渴舌乾苔刺旋邀里中醫者治之以脈沉肢冷痛瀉為寒用附子理中湯病人因去歲病時悉領溫熱之象梗概頗知若盡寒邪豈有口渴苔刺等證未敢服此藥又延二醫一系去歲之醫訂清解散一訂溫中散寒之法皆未行次日邀豫診視面垢神煩唇燥口渴苔刺鼻煤熱利無度寒熱仍作胸悶腹痛幸得刮放經絡少鬆余云此係溫邪極重之候瀉乃熱邪自尋出路肺伏腹痛乃邪困未宣據此唇舌確非寒象病者疑舊病愈未久為得又招此邪余曰邪之中人乘人之虛如水之趨下遇竇即留何分遠近能保周身之元氣庶免賊邪之侵害刻據證用藥仍當雙解稍遲陰竭則無救矣旋投雙解泄瀉反止痛勢大減煞唇舌如枚更加筋惕肉瞤余與前醫知為病後與陰未復大有陰竭之象難於純用攻下酌以生鱉甲生地沙參各兩許煎濃汁以煨的藥疊投三劑病勢大減忽然嗆咳不休吐痰沫數盂知肺為燥傷遂用清余保肺化邪一法不出十日全愈已未冬天氣甚暖宛如春日蓋陽氣不主收藏而反發泄是時彭姓闔室病溫輕者救人重者亦數人俱已向愈最後一婦人甚篤初起時不甚大熱微微咳嗽脈象沉數面色微赤咽乾口苦舌淨無苔舌赤如絳彼延許生診視許生以神解清化之藥與之越三日壯熱大作而舌終無苔神清躁亂口渴心煩余診之曰此溫邪伏在營分由里以達於外也譬之隱伏之火得搜揚而烈焰焚空不可止遏但此婦稟質素弱陰分極虧陰虧則不能化邪以致邪勢延漫三焦若不下邪無出路若下又恐陰液隨竭勉用復蘇飲加軍末八分一劑而得解數次二日添舌短神昏鼻煤譫妄等象豫曰此梟焰猖狂陰液乾枯不可救矣其子再三諄請余想內經曰諸寒之而熱者取之陰所謂求其屬也王太僕云寒之不寒責其無水仿費建中治痘用濁陰意合張景嶽玉泉散方用金汁一碗井水兩杯生石膏二兩研和服下而人事漸清譫妄亦止舌不絳而心不煩熱亦漸退惟咳更甚余曰此溫邪餘熱從營陰出於衛陽由血分達於氣分熱在上焦肺部溫邪漸達皮毛後必發疴發癢清金保肺可愈矣令許生以清燥救肺湯與服繼以藥汁熬膏調治而愈乙卯夏有耿姓客寓某行患寒熱身痛等證一醫用清散之藥越三日熱象頗加人事昏迷身痛不能轉側行東延醫診視醫云脈象數大舌苔黃厚作熱邪傷陰治以滋化之法病勢更重時以六日矣邀余診之餘驗舌色深黃脈象數大面垢神昏壯熱至夜更盛胸高氣促種種危證皆溫邪深伏三焦未經漬達時以六日病勢益劇陰分先傷雖連得養陰之藥奈溫邪不潰若不早下以存陰必致舌黑苔刺譫妄專變但病者系異鄉孤客非一人可以當擔必得一二道中同為斟酌方能用藥伊即延一醫診視亦主此法用增損雙解散硝黃四五錢連服二劑下敗糞十餘次病勢頗減改用養陰壯熱如故與雙解數劑苔色已退脈和熱輕越二日厄逆甚劇舌苔白舌本淡與同視之醫合商醫曰邪勢未盡下之可乎余曰邪固未盡但正虛厄逆不可下也宜歸氣飲消息之服後厄止又二日厄復作更盛於前皆以為邪未盡之故正虛不能再下酌用和法服二帖厄全不止余診時旁坐久聽厄聲由肋而起此必兼氣鬱因訂代赭旋覆湯合歸氣減丁香一服即安可見溫邪盛時宜涼下衰時有兼證自當從兼治不可拘於一格也文學某翁素知醫四十二歲始得一子甫一周於嘉慶丁巳七月間患溫某與前葛枳桔等藥服之不效次日又服清化之劑至三更喘逆非常就診於余余見苔黃帶黑喘如曳鋸因與麻杏石膏臺加味太極法治之藥未煎就舌黑如炭芒刺如銼喘逆尤甚舉家號哭以為必斃矣所幸者猶可灌藥至次日午刻忽解一次余大喜日生機在此又與加味太極大二粒始終服增損雙解一法至十六日始得喘平熱退而愈共約服硝黃二兩有除下糞一百餘次愈下愈多頗可驚訝其祖母年逾八十向余泣拜日非翁見之真守之定小孫何能再生余急抉而謝之志此以見溫邪始終當下有如此者
