body:
  text: 卷二慎始溫邪慎始最為要著常見伏邪輕而發之緩者尚可遷延時若伏邪重而發之速者一病舌即乾紅或紫或黑人事異常身體散漫不能站立頗似虛象誤認為虛投以溫補往往一二日即斃可不慎歟甚有不熱反冷心腹絞痛酷似中寒認明舌胎一見紅紫裂紋或口渴引飲不論脈之浮沉放手施治無不迎刃而解倘病家醫者疑似畏怯必致輕變重重變死矣更有始治不善邪化不淨延致潮熱津枯者有之肺傷咳嗽者有之肌膚甲錯骨立而死者有之此時縱有良工莫可如何初起輕者神解芳香升降選用者非大劑雙解不可或黃連解毒合升降散亦可夾表者敗毒合升降為妙溫疫之邪本天地穢惡之氣古人以飲屠蘇採蘭草取芳香之氣重滌穢也如神解芳香升降太極等方皆逐穢之劑故首列之以冠群方與古人之意有深契焉發熱惡寒溫病發熱是陽邪外達之機溫病惡寒乃陽氣內閉之象故與諸證發熱惡寒不同諸證發熱惡寒諸書俱已辨明茲不復贅惟溫病發熱必蒸蒸然由里達表摸之在肌肉之分夜盛於晝或寒或冷或麻不欲近衣忝之脈象或沉或伏或浮或大或數甚至至數模糊面色晦暗神識不清舌色黃赤咽喉干痛劇者一身悉痛兩脅胸腹痛甚以此數證辨之溫病之發熱惡寒自不能混於他證矣初起宜清化湯神解散如舌胎已黃大便秘結者加酒炒大黃下之或合升降太極丸兼表者荊防敗毒散兼寒者九味羌活汽之類選用如人素本陰虛感受溫邪不能外達先有泉竭之危腰必痛甚與大劑六味合生脈先救水源再治溫邪如人素本陽虛恆多自汗怯風惡寒感受溫邪自暫以維陽透邪如玉屏風散用生耆合神解清化或芳香飲或人參敗毒散皆可選用此二證當忝四損四不足條忝看溫病後寒熱又當忝虛實治之如餘邪未淨仍當逐邪熱方能退無邪方可清補養陰更有濕鬱發熱愈投涼解而熱勢愈甚煩躁不寧或有汗或無汗口乾不飲再視舌胎或黑而潤或黑中邊白或灰黑不幹水上便清利脈雖長大必兼耎濡之形此濕鬱之熱有似溫熱也總以舌潤不渴為辨藥當以參附朮附維陽化濕為主熱始能退若再投寒涼必殆此溫證行時偶有之證不可不筆之於此以俟臨證採酌更有陰陽雙虧汗發熱面赤心煩躁擾不寧脈大無力又當以十全大補湯為專治一概寒涼皆非所宜不熱溫熱之邪自口鼻吸入三焦三焦乃手少陽所屬少陽為樞出表則熱伏里則不熱其理顯然徵之內證舌心乾紅咽或痛口或干心中嘈雜作煩夜臥不寧二便或有或無時或惡寒作麻脈必沉數悉屬困郁之象鬱極必熱熱則變證不一審明脈證輕以敗毒消化神解芳香擇其對證主之重以升降雙解緩緩間攻亦有始疑義不熱而愈者亦有因揭宣而病勢加重者乃邪因宣而外達自當疊進雙解務以邪淨為止萬不可半途而廢凡視此證必須先向病家說明病情使彼疑釋方可放手醫治若徒執仁心恐遭謗議寒熱往來似瘧寒熱往來在傷寒為少陽現證溫病有此亦屬半表裡之邪與惡寒發熱不同亦與瘧不同蓋瘧發有時確有定期定證可據惡寒發熱是一時兼至故與寒熱往來熱已方寒寒已方熱不同但溫證中多有似瘧者或先寒後熱或單熱不寒忝看舌白如粉者達原飲加柴胡胎黃舌赤脈數口乾便赤者增損大柴胡湯下之但寒熱往來在初起時邪郁少陽少陽為樞傳裡則重始則四肢作麻寒熱往來繼則熱多寒少再則但熱不寒是溫病入里為重治法於初起時寒熱往來宜用芳香神解加柴胡薄荷熱甚加大黃如熱壯煩渴增損大柴胡加花粉為妙若邪潰後用小柴胡湯或參胡三白散減調治如正氣已虛寒熱往來又當以補中益氣柴芍六君兼陰虛者補陰益氣參用頭痛附巔頂痛頭目脹溫病頭痛乃熱邪上干清陽故頭痛面必赤神必煩舌必紅脈必數認明證候急與清化升降之方使清氣升濁氣降頭痛自止如熱甚口渴則白虎湯玉女煎最妙羌防芎芷皆非所宜如兼風寒面必收束色慘暗舌必白滑外必惡寒自當先行散表審明痛在巔頂屬太陽痛在滿頭及眉稜骨者屬陽明痛在兩角屬少陽兼暑者必在夏月皆照加引經藥可也惟溫病頭痛渾渾不自知其所苦所以溫邪最易昏人神識也更有素本真陰真陽皆虧一遇溫病正不勝邪陽虛頭痛必現面青肢逆惡寒喜見燈火光旋又畏之緣有伏邪故耳治法從權暫投參茸膏貧者黨參桂枝借用亦可陰虛頭痛面必浮紅舌必乾紫口或渴不飲惡見燈火光宜六味地黃先救腎液再治溫邪可也溫邪頭目脹乃熱邪上蒸初起以者清化菊花天麻重則涼膈加荊防天麻之類或神解太極下之如陽明有熱目脹加石膏舌黃宿食也用保和丸二陳湯或查麥神麯萊菔厚朴皆可選用如屢經攻下頭目脹者又屬陰虛宜六味地黃湯治之頭重頭眩內經曰歷於濕者首如里此乃濕熱上蒸之故是以頭重溫病亦有之兼濕者脈必濡滑溫熱者脈必長大而浮宜用升陽苦降之藥如清化湯加羌升防芷龍膽大黃之類至頭眩在溫病悉屬熱邪伏郁中焦乾犯上焦清陽之位是以眩然如暈脈必寸大於關宜用升降散清化湯如菊花天麻至有兼風兼痰兼虛吳戴二氏辨之甚詳茲不再贅惟賢氣素虛之人一遇溫熱大耗真陰陰不下吸陽無所依上為眩暈又當照賢不納氣條治非大劑潛鎮之品不可如六味地黃加磁石黑鉛如真陰虛極少加參附亦可此脈重按必空散或不及尺以此為辨身體痛附身重溫病身體痛與傷寒有別寒邪乃嚴肅之所氣氣主收斂中人肌表故身體多如縛束而痛溫病乃亢厲之氣氣主散漫中人三焦浮越諸經營衛怫鬱身體多如損傷脹悶而痛參看面色或垢或赤脈或伏或弦數舌苔或白或黃舌本必赤且多紅點辨明色脈外證雖現發熱惡寒頭眩諸表證自不得誤認表邪而用表藥發汗初起宜照寒溫條辨例用神解芳香升降雙解諸方隨其輕重斟酌至於陽虛者身體亦痛外必有惡寒作麻自汗神倦別之黃耆建中合透邪藥可暫用陰虛者身體亦痛乃營血不通以夜脈細辨之濕勝者身體必重頭如里身如石脈必濡耎逢陰雨更甚辨之此溫病之外雜證身體痛者又不可不詳辨也項背痠痛項背全屬太陽初起痠痛乃邪越太陽也神解清化為主如兼寒邪九味羌活為主或兼狂躁熱壅其經也石膏黃芩為主屢經汗下熟退而項背痠痛者血燥而筋不榮也六味四物為主腰痛要酸腰者賢之府也因病致痠痛其中虛實不可不辨所謂實者邪也虛者本也如太陽經感寒必痠痛感濕腰必重痛如坐水中氣滯痛必流走此雜證之腰痛腰痠也若溫病則不然熱邪深伏出表則浮越太陽困里則直逼少陰設腎不虛賊邪因何直入古人所謂邪行如水惟注者受之良有以也此溫邪最劇之候十難全半若不先救真陰邪何由化當與大劑生脈六味加化邪之品預救真陰以全生命若不預為籌劃肆行攻伐則俱亡肢冷脈微舌黑苔刺直視遺尿等證勢所必至如感邪極重腰痛如折防火燎原必須急下救陰或於下法中佐用水之品或朝服六味暮投雙解務於臨證酌行非筆所能擊也至於病後腰痛虛不待言又當以六味地黃加參茸為主余可類推腿膝脛足痠痛溫邪初起時腿膝脛痠痛者邪在太陽經也羌獨艽防牛膝防已為主痛有因腳氣痼疾者於治溫邪藥中加檳榔木通靈仙艽防以上四證兼見再加頭痛身疼又當汗下雙解為主如未經汗下則以九味羌活加牛膝木通豆豉艽靈之類如已經汗下表邪已解則當察邪氣之有無正氣之虛實專治筋部免致殘廢為要如餘邪不淨則清化中加苡仁牛膝木瓜筋攣則秦艽木瓜筋緩則蒼朮防己紅腫則赤芍丹皮之類若無餘邪尺脈虛小腎陰不足又當以六味牛膝知柏滋益陰精為主惟足軟或腫或痛站立不起者乃軟腳溫也蒼朮白虎湯合神解散方為合法肩臂痠痛附腕痛肩臂痠痛手太陰經脈受邪初起神解加引經藥汗下後肩臂痛甚經隧阻滯脈弦有力證多熱渴者神解加秦艽銀花藤之類血脈空虛脈濡無力者證多痿困四味六味為主至腕痛乃風淫末疾初起解表病後血與肩臂痛同治周身骨節痠痛周身骨節痠痛在他證是寒邪凝結表散為是溫證有此是邪伏極深不易透化非雙解不可拘攣瘛瘲痙痓附筋惕肉鑑瞤溫證首尾皆有拘攣瘛瘲痙痓之病初起時邪困三焦經絡滯塞或夾風濕表裡困郁太陽經氣不行常有此證一經汗下經氣一通諸證自平或屢經汗下後或病愈後或其人肝陰本虛風火內熾或夾餘邪亦有此證治法又當以養榮血為先之祛邪次之若因循失治恐成廢人矣汗下之法增損雙解或加艽羌威靈牛膝以引經或加二妙以化濕惟麻黃斷不可用盡辛溫發汗恐竭真陰此溫病之所以異於傷寒也未路治法養榮清邪清燥養榮湯柴胡清燥湯對證選用俱可加殭蠶犀角忍冬藤鉤藤木瓜白菊花桑葉白薇絲瓜絡之類至筋惕肉瞤一證不但溫證最劇即雜證亦然筋所以惕者無血榮也肉所以瞤者無氣調也氣血既敗人豈能生更有熱邪失下以致真陰枯竭證現舌黑神昏直視遺隸呃逆肢冷在無邪尚屬敗證況炎梟未滅一身有限之氣血盡為邪耗縱有良工其如病之不治何然而醫為仁術豈忍坐視據證論情惟以生脈合六味地黃加犀羚牛黃金汁之類大作湯液日進數斗或可希僥倖於萬一也諸汗溫病有自汗盜汗狂汗戰汗之別更有無汗者不可不辨溫熱之邪天地厲氣自口鼻吸入由里達表易於自汗或其人素本多汗一遇此邪甚至淋漓不止不可以表證論神解清化合白虎如兼六淫自當隨證加減如邪困膜原舌白如粉又非達原不可盜汗多在病之中末二路不是餘邪潛匿即是營血熱溢清其邪益汗自止增損小柴胡出入加減主之當歸六黃湯加浮麥亦可惟狂汗一證必須細心研究溫熱盛時或手舞足蹈煩躁不寧而後作汗者最為駭人須驗其作汗之狀面忽浮赤脈多浮大人事了了方是作汗之象否屬狂證三黃石膏湯白虎湯竹葉石膏湯為最至戰汗一證向用達原治半表半裡之邪每多戰汗而解戰時搖床撼榻邪正相爭氣閉脈伏直似死者氣宣汗出即時而愈有一汗不已而再戰者有單戰而不汗對期復戰有汗者生無汗者死有戰一次不能再戰屢下而愈者有不能再作戰汗即加沉困而死者總因人之強弱耳凡戰汗之時不可服藥補則助邪下則傷氣應聽自然再觀脈證施治戰汗或多與熱米湯飲之助其作汗大底戰汗之脈以浮為佳邪出於表也虛散微細應有變證煎人參湯以待之防其脫也然必察其戰後邪淨而氣欲脫者方可用若貧者米飲代之戰汗後脈靜者吉躁疾者危氣平者吉氣粗而短者危神清者吉神昏者危舌痿不能言者死目眶陷者死目直視無光者死戴眼反折者死形體不仁水漿不入者死戰汗雖為佳兆亦有吉凶嘗見服大汗藥毫不得汗而飲冷水得汗者又有服下藥得戰汗者涼血活血養血得戰汗者生津益氣得戰汗者種種不一當知戰汗乃陰陽交和表裡通達自然而然非可強致也近年以來以達原之法治溫病罔效以解表藥治之亦不效然後揆之以理驗之於舌脈則與達原有別焉達原之治溫邪者寒熱往來舌白如粉脈多長滑是以潰半表半裡之邪每多一汗而解直待舌苔轉黃方行攻裡此所謂表裡分傳也較今之溫證一病舌即紅赤或如紫絳亦有白胎多雜紅點初起時脈反沉伏肢反逆冷邪逼於裡則亢極似陰亦有一病即脈現洪大口乾咽燥有渴有不渴外雖憎寒作熱甚則作麻表之不應汗之無功投以雙解大便頻行熱沫時下往往無汗而熱自解者亦有一下而汗自得者始知六氣更遷運轉相火三焦受邪不同濕土司政故草果檳榔厚朴一切辛溫之品皆非所宜他如運轉寒水則今膏黃芩運與昔之草果檳榔厚朴前後同一轍也頭面腫耳旁腫溫邪頭面耳旁腫乃熱邪上溢三陽溢於太陽則頭腫溢於陽明則面腫溢於少陽則耳旁腫頭腫者欲名大頭溫此證最惡治不宜緩緣清陽為濁邪所幹最易滋蔓急用普濟消毒飲加野菊大黃面腫色赤屬溫熱宜用荊防敗毒散加白芷葛根蘆根石膏滑石等藥如舌黃口渴譫妄便赤者增損雙解若面腫色黃色白者皆屬風濕即內經面腫曰風之證又當從神術青龍婢諸法而參酌之至於耳旁腫亦名時毒初起只宜疏散不宜敷貼致邪內閉如紅腫堅硬則有潰膿之患燕宜荊防敗毒散加柴胡牛子甚者加制軍下之增損小柴胡湯亦可頸項胸紅腫溫邪頸項腫乃邪郁陽明兼夾風熱俗名捻頸溫又名蝦蟆溫宜普濟消毒加生軍石膏葛根之類餘邪發頤又當參虛實治之至胸前紅腫有赤起小疹羊毛溫多有此證亦有不見此形者治法不外乎神解雙解總以邪之輕重為準周身紅腫溫邪周身紅腫一則熱為寒伏一則熱邪外溢最佳之象宜清化湯神解散如紅腫如疹如霞宜荊防敗毒散加殭蠶歸芍之類如顏色紫暗或片或塊累累或或如葡萄或如玳瑁又屬葡萄疫玳瑁溫也宜普濟消毒飲或犀角地黃湯為最此溫疫門中周身紅腫之大概也至於病後周身腫亮如燈或曰下臥蠶脈象沉滑又當作風濕治開鬼門潔淨府諸法又在所必需也發黃溫證發黃乃邪熱侵犯肝膽非濕熱鬱蒸陽明可比脈必弦數口必煩脅必脹一身盡黃兩目如金小便如血夜臥不安舌尖紅赤茵陳蒿湯倍大黃為端主或增損小柴胡合溫膽導赤皆可選用兼嘔者橘皮竹茹湯加茵陳枇杷葉如瘀血發黃面色不榮必多晦滯如煙薰狀小便自利茵陳蒿湯加桃仁歸尾殭蠶丹皮梔滑之類破瘀化熱為主如兼濕熱色亦黃多暗垢舌白不渴小便不利以此為辨茵陳五苓散或益元散加蒼朮白蔻之類甚者理中湯加附子如胸悶脅脹兼憎寒作熱脈或弦長滑大胎雖白必兼紅點達原飲加茵陳梔滑之類主之至於女勞黃酒黃不在此例發斑疹附葡萄疫玳瑁溫疙瘩瓜瓤捻頸大頭軟腳諸溫溫病發斑與傷寒迥別傷寒之班寒鬱化熱熱傷胃腑或失表散以致熱邪內郁燔灼榮血陰液盡竭或失下以致病邪內陷故傷寒發斑則為病為溫病發斑不拘輕重無論紅紫皆由熱毒聚於胃胃為多氣多血腑足以敵邪力能化邪於肌膚之外為斑為疹故為病解況溫邪由里達表非傷寒經邪傳變可比常見患溫者行能發斑發疹邪向外化生全者多但斑疹一見急須神解清化輕者消風敗毒倍殭蠶加牛子元參石膏浮萍裡實者加大黃重者大劑雙解加犀羚板藍野菊花重用石膏如唇齒腫黑口臭異常或兼肉鑑瞤筋惕邪不能出急加生地蚯蚓汁絲瓜瓤以透經絡之匿邪有患畜血發斑者斑形稜角血必先畜而斑後見於前法中加桃仁紅花蘇木之類至葡萄疫已在御纂醫宗金鑑發明不贅惟玳瑁溫龐安常僅言其證未備其法又如疙瘩瓜瓤捻頸大頭諸溫悉屬溫毒肆虐治法亦不外普濟消毒增損雙解大小清涼清化等方擇其對證施治惟軟腳溫一證必兼濕邪加蒼朮於涼解方中誠為合法煩躁溫證煩躁與他證不同古人原有煩為心煩躁為腎躁之說在溫邪悉屬熱鬱邪輕則煩躁輕邪重則煩躁重有一病即煩躁者證現憎寒發熱敗毒散冬月九味羌活湯有傳變煩躁者舌黃渴飲身熱汗出邪已到胃增損雙解散三黃瀉心湯加味涼膈散選用舌苔已黑人事漸昏邪入心包也犀角地黃湯加羚羊牛黃黃連解毒湯紫雪選用經汗下表里俱清而仍煩躁者陰液傷也生脈散六味地黃湯吳氏諸養榮湯楊氏大小復甦飲選用或用汗解清利滋潤諸法不應而煩躁更甚者當細驗舌胎若黃黑胎中夾一塊白潤是為夾水或平素胸有痰飲或未病時曾飲冷物或初煩躁時過用生冷或過用清涼太早皆能停飲於胸膈胃脘之間熱為寒伏外不能達表內不能傳腑故煩躁轉盛難怪驗舌之後細按胸脅滿痛而軟漉漉有聲再診其脈右寸關或弦緊或緩滑皆停水確據當以蒼朮半夏萊菔先消其水氣然後治其煩躁遠銷不應者甚者加醋炒芫花不論舌胎有無黃黑而少腹或有痛滿處但煩而兼小便不利者即屬水氣當以導赤瀉心豬苓四苓益元利其小便所謂心邪不從心瀉而從小腸瀉也嘔吐自利附吐蚘呃嘔吐自利乃溫病中最善之候何也邪自口鼻吸入先中上中二焦胃不受邪與邪相拒在上則吐在下則利已具分消之勢惟嘔有別邪犯陽明太陰者嘔有口氣者屬溫證無口氣者屬雜證不可遽用寒涼使邪不能透厲害傳化雖時有肢逆脈沉亦不可妄用溫熱致增嘔勢甚有舌紫神昏毒邪上犯清道急當下之即不嘔若已發熱舌白而嘔者吳氏達原飲加半夏有三陽證兼三陽加法如舌赤胎黃又當兼神解太極使表裡宣暢其嘔即止若嘔而煩渴邪犯胃也白虎湯玉女煎加蘆根若嘔而舌黃胸有痛滿處橘皮半夏湯夾實加枳實查麥神麯若嘔而舌白心下臍上悸小便不利者不水氣四苓散加半夏木通或益元散利之若嘔而滿痛拒按者大柴胡湯凋胃承氣湯選用若嘔而口苦邪犯少陽增損小柴胡湯不寐者溫膽湯有乾嘔不止舌乾口燥者胃受火傷竹葉石膏湯若屢經攻下嘔不止而舌無胎多汗心煩中氣傷也大半夏湯或香蔻六君倉湯合定中湯煎汁頻服若嘔甚吐蚘利甚便蚘皆屬傷之象甚則噦呃神昏已蹈危機經所謂臟敗者聲必噦呃證更危尤當詳察如聲自丹田而起一則應下失下熱邪傷陰發為呃逆調胃承氣湯佐益陰之品加刀豆子柿蒂苦以降逆或可十中救一一則真陰枯竭腎不納氣吸不至腎呃聲頻頻舌黑而神不昏者緣邪輕正憊歸氣飲最捷加刀頭子柿蒂更妙更有一種多郁喜怒之人或夾痰滯氣與邪搏呃聲必從兩肋而起雖呃至搖床撼榻視舌或黑而肢不冷當以散郁開氣化痰之劑使邪氣宣揚自有生理逍遙越鞠代赭旋覆四七皆可選用不可以呃逆盡棄為不治之證也唇燥烈赤紫淡白陽明之脈繞唇溫病唇燥唇烈色赤色紫俱屬熱毒困於中焦陽明熱盛之象宜用白虎湯合神解升降竹葉石膏湯如兼胎黃舌赤口渴壯熱煩躁脈數者雙解散重用石膏或增損涼膈散加石膏隨證與之至溫邪初起邪伏三焦或匿膜原未經宣達唇色困暗頗似淡白不可用溫藥當與清化神解芳香達原選用如溫邪退後唇淡舌白脈來無力倦怠少神又屬虛象宜用六君子湯或其人素本陽虛胃弱多濕當與理中湯金水六君煎如餘邪未盡熱猶未清參胡三白散加味為最脾虛不運資生丸食後服再如便溏少食參苓白朮散調之鼻孔乾黑附鼻掀扇鼻乃肺竅風寒外襲則鼻流清涕荊防前桔紫蘇為主溫邪內鬱則鼻孔乾燥肺熱則清化加薄荷麥冬胃熱則煩渴根石膏為主腑證則胎黃而渴增損雙解三黃石膏為主傷津液肺燥麥冬生地合大小清涼飲為主熱在經者十之五在腑者十之二三亡津液者十之一二至鼻孔黑如煤煙溫熱灼肺已極由乾燥失治而然急當清下少緩則肺胃焦枯矣三承氣合白虎或三黃石膏加犀羚蘆根或犀角大青湯視其兼證擇而用之總不及增損雙解重用石膏為端主尤有鼻孔欣扇一證有虛有實實者緣鼻為肺竅肺為華蓋外合皮毛易於受邪風寒外襲痰火骨壅兩相搏激遏抑不宣氣粗有聲喘咳胸滿不渴又宜蘇葉前桔荊防葛根萊菔白芥黃芩主之惟麻黃一味斷不可用忌其溫散也兼寒者暫用亦可虛者腎氣不納呼多吸少出入息微多死止證必得之屢經汗下或其人色欲過度賢臟本虧急用大劑六味加麥味牛膝枸杞黑鉛或可百救一二加入人參亦可舌胎強燥卷短痿古人云論病寒熱以二便辯不及舌辨為準蓋舌乃心苗有諸內必行諸外惟溫熱一病邪由吸入遊溢諸經心為之主故一病觀其舌而知其病之吉凶如溫證胎黃舌赤或多紅點用升降散神解散兼喉痛者清化湯加牛子兼風寒者胎必白荊防敗毒散香鼓湯兼濕熱者胎必白滑加蒼朮為端治兼暑者舌必純赤或喘之暑在表者實人以升降散合香薷飲加葛根黃連如煩渴竹葉石膏湯虛者人參白虎湯生脈散量人虛實與之夾食生冷凝滯中宮胎必白厚或如白粉吳氏達原飲加香薷藿香砂仁萊菔青皮山查之類至深秋早冬之際燥火當權一患溫邪陰津立亡舌必乾紅無胎口鼻如火皮膚皺揭筋縮爪枯金從火化反見惡寒不渴之象若誤為寒濕投以濕散無不危殆初起時榮承氣湯加犀連石膏殭蠶大小清涼飲溫邪直入心包人事昏悶者急與紫雪或珠黃合天水散燈心湯下如衝脈為邪所傷厥氣上逆重用白薇降之至舌燥乃熱邪聚胃津液受傷急下急清舌本強硬為熱為痰急宜清下須痰之藥兼白胎者膈間未經煎熬其痰尚濕佐以半夏增損大柴胡湯兼黃胎者已經煎熬其痰漸燥蔞貝小陷胸湯兼黑胎者熱極痰亦為火佐以牛黃方效若無痰舌色正赤深紫燥裂而強者熱毒蘊於心包絡也三黃石膏湯加犀角牛黃或紫雪急徹其熱舌燥雖與舌強相類而燥屬胃主熱強屬心主痰差有別焉又舌短而痿舌硬如木乃虛脫已極大補及滋潤或可百救一二若屢經汗下清熱消痰而舌強者又當與舌痿同治又舌卷一證一見黃胎即便當下失下則必由黃而黑更生芒刺再失下舌必短縮為下證至急之候宜大下疊下方和緩則不救胸背脅肋腹痛附脹滿附羊毛溫溫證胸背脅肋疼痛用滿俱屬熱邪深重怫鬱三焦由里達表不能透化最為凶逆治法輕則清之重則奪之輕則如清化芳香神解諸方加薄荷竹葉蔞貝甚者加味涼膈散諸瀉心湯如邪犯膜原舌白如粉又消退以達原合三陽加法為主至於諸痛脹漬滿乃溫證中最劇之候每每初病時不渴不熱身無大苦微覺痛楚參之舌脈數便黃口苦夜臥不寧等證若視為泛泛不即祛除直待猖獗變生倉卒莫可救援者比比嘗見腹痛不熱一二日即斃者斃後渾身表紫直似痧脹良由穢惡之氣閉人清竊悶人關隘致血脈不行榮衛不通所以斃之速者氣閉也渾身青紫者血凝也似此迅雷不及掩耳之凶候當遵內經刺穴瀉熱之法外用針砭內投雙解輕者一二劑重者數十劑使閉者開悶者宣何敗之有倘畏藥峻猛或半途而廢輕不中病終歸必敗業醫者一見此證審明舌色形證見真守定放手施治不但元氣不傷抑且邪去正安設遇此證不妨向病家說明病之凶惡必須早治庶可幸全遲則無今特筆之於此望業醫者以仁宅心務以生命為重也又羊毛溫邪一證大都胸背閉悶予每踵其法而治之活人甚多若不申明閉悶二字何以釋醫者病家之疑試觀痘之閉悶初病亦無大苦轉瞬腰折頭傾目泛紅水胸悶氣促斑點叢生痘形不見竅血肉紫非閉悶之明驗乎大抵痘與溫同一疫邪也而痘之酷於溫者一病即腰折不立緣胎毒伏於命門與腎相通溫邪一閉二火交灼腎經留邪斷難望生間有不然能治萌芽表裡雙解使外疫開而內毒解予之經手驗者予之子與姪及孝廉路公之侄也他處未有多由不能治其萌芽之故但羊毛溫疹一證有何異於痘疹乎以此悟彼能治痘之閉悶即能治溫之閉悶也況溫邪中人三焦較痘又輕一層所以人之疑議者上古無此名證要之痘證上古亦然至於疹之一字予歷驗二十餘年有病解而現點如疹者非人人病解散縱有虛象當審明何處之虛加藥兼治為此證始終之關鍵也羊毛溫疹治法腹滿痛附少腹滿痛腹為胃與小腸之分界滿痛者邪結在胃也雙解下之則愈至其中兼痰水畜血各詳本門少腹滿痛邪結下焦也小便不利兼畜水也四苓散小便通利大便色黑兼畜血也抵當丸如無兼證但系邪結雙解散便膿血大便閉溫邪便膿血有燥濕之分便血眉熱宜涼宜攻犀角地黃調胃承氣治之便膿屬濕熱清熱兼分利為主分清飲治之如初起兼疫痢則當解表為主倉廩湯最妙毒勢重極方可下之如邪在少陽便膿血者寒熱似瘧小柴苓芍木通治之溫邪煩渴譫妄便膿血者非疊下不可雙解重劑連下之兼裡急者加檳榔枳實如屢經攻下便血滑利者又當以補陰益氣加減主之至大便閉秘溫邪熱困攻下自不待言更當參看舌脈如胎黃口渴壯熱舌乾脈數雙解散舌白如粉三消飲當分別輕重與之如大便閉屢下不通者陰枯也生料六味以滋陰液或合黃能下之若人多有此證兼水者大便多閉腸鳴脈弦當用小半夏湯甚者加醋炒芫花如虛人久病人又當用密導諸法務使溫邪滌盡方可稱為良工其間進退亦須斟酌諸小便頻數不利黃赤黑多短少遺尿溫證中小便頻數乃熱在下焦宜用神解六一加軍治之不利者亦屬熱鬱初起在表時頭痛發熱小便不利者熱入膀胱也四苓豬苓合神解升降選用東垣云小便不利而渴者熱在上焦法當淡滲小便不利而不渴者熱在下焦法當苦寒此為可據溫邪傳裡大便閉而小便不利者當先通大便大便通小便自利此時疫為然他證則否時疫屢經汗下小便不利者陰竭也生脈六味主之至少腹如鼓則無救也凡小便不利日久下關不通必反於上往往嘔吐呃逆噦阻涓摘不能下咽至湯藥不進者死用大田螺一個麝香二分同搗敷臍上帛朿之即通古沃用蔥熨及井底泥敷少腹者俱可但不宜於陰竭之人耳至溫邪初起小便多赤黑或兼黃色熱甚則赤熱入血分畜血則黑即小便一證可以驗裡熱之有無深淺邪在表小便黃可用清化販毒加六一在裡色赤可用雙解升降如色黑者當以逐瘀清熱為主犀角地黃加大黃桃仁合神解清化或大小清涼飲如清涼大過表裡無熱證而小便赤者又當以升脾陽為主不可寒涼至溫邪屬熱小便多者甚少短少者恆多如初起小便多者乃熱邪未化當以漬邪為主神解升降主之如屢經汗下小便多者屬虛也益氣升陽為主補中益氣湯補陰益氣煎皆可亦有腎虛小便多者六味地黃湯加五味濕熱下注導赤六一臺升降散大抵未下之先小便多者屬熱未化小便必黃必煩熱渴飲既汁下後屬虛虛則色必白不渴不飲氣虛寸脈不及尺血虛尺脈不及寸以此為辨初起小便短少熱在膀胱宜大小分清飲抽薪飲升降六一加知柏芩連車滑之類至遺尿乃膀胱失約急清其邪遺尿自己清化合抽薪為主若有燥結胎黃譫妄之證可加大黃甚者熱閉三陽口渴異常急宜白虎湯加殭蠶生地花粉以解熱救陰為主否則易成消渴若神昏譫言胎刺鼻黑瘧結陰枯小便自少名屬不治欲盡人事惟以大劑養陰攻邪法或可百中救一囊縮溫疫囊縮與他證異者他證囊縮寒邪陷入厥陰則囊縮陰證寒極深中厥陰則囊縮溫證悉屬熱邪直犯厥陰斷非陰證可比務要辨明脈證施治陰證囊縮身冷厥逆脈沉溫證囊縮亦身冷厥逆脈沉然寒熱各異當參看脈象沉必兼數或至數模糊再以舌辨或紫或黑或強或硬人事不清不似陰寒之舌白可以立判矣且陰寒囊縮囊必入腹如婦人溫熱囊縮玉莖必在此外形之辨也設遇此證急以大劑雙解下之如虛人以黃龍湯破格救之或六味地黃加殭蠶大黃皆可考古書扁鵲以囊縮為死證然能極力救援或者百救一二亦不負仁人之心也多言譫妄善妄附呢喃鄭聲溫邪多言即譫妄之漸譫妄乃熱邪干犯上焦當以雙解涼膈三黃瀉心湯諸方選用如膈熱蒸心脈洪身熱汗出惡熱白虎湯黃芩湯痰熱聚於中上二焦脈弦滑胸痛拒按小陷胸增損大柴胡選用至婦人熱入血室脈必弦沉心下少腹或有痛滿處增損小柴胡湯加犀地桃仁承氣皆可如熱入膀胱少腹滿小便不利四苓六一加太極為主此實證之譫妄也至於屢經汗下二便已調胸無阻滯六脈無力又當作神無所倚治又有呢喃鄭聲乃陰氣虛極心神失守不可不辨呢喃者如燕語也鄭聲者鄭重頻頻謬語諄諄不已也皆極虛之象當大劑調補陰陽陽虛參附為主陰虛六味為主如熱在上焦生脈散中焦歸脾湯下焦六味地黃湯諸養榮湯此虛證譫語之治也至於善妄多因畜血乃譫妄之漸如兼脈芤痛有拒接虛即照畜血治桃仁承氣代抵當丸選用如無畜血證又當用雙解清化諸方也發狂發狂一證乃陽明熱極胃實之象急當涼下甚有棄衣而走登高而歌逾垣上屋者蓋四肢為諸陽之本陽盛則四肢實故能登高也內經以邪入於陽則狂是皆陽明邪實之象以增損雙解涼膈之類下之如無胃賓白虎三黃石膏大小清涼之類清之此皆實證治法至於虛煩似狂而卮更勝於實狂也病後多有此證或餘邪不盡養心化熱為要或悲憂不已病在肺也生脈散或失精不秘病在腎也六味地黃湯或多鬱怒病在肝也逍遙散或飢飽不一病在脾也歸脾湯此虛煩似狂治法更有畜血發狂目睛紅黃舌色多黑桃仁承氣抵當之類加滅治之此其大略也沉昏多睡附不寐溫邪沉昏乃熱邪入手厥陰心包有漸入深入直入之分漸入者邪犯心經人事尚清深入心包人事半明半昧直入心臟則人事全不知矣皆極危極險之證當於治溫藥中加辛溫之品如舌赤舌紫胎黃胎黑沉困昏潰雙解散加犀角牛蒡紫雪之類如舌淨無胎黃邪已退餘邪尚存當大養陰液或犀角地黃或生料六味地黃皆可至其中夾痰水夾結血亦令沉昏惟夾痰者加蔞貝夾血者加赤芍桃仁有燥屎者加元明粉大黃此治沉昏之大概也若夫溫邪多睡在未經攻下之前舌黃脈數此邪實也急下則愈或經汗下病邪已去六脈平和舌胎已退多睡省時了了此名復陰氣最佳之兆不可汗下惟靜養消息勿藥為佳即或投藥當以養陰化熱為主如夾痰多睡清化方中加蔞貝夾水加苓平甚者加酷炒芫花如脾虛多睡病後多有之六君子參胡三白散歸脾湯棗仁生用虛實既分補瀉各異又當存乎其人也至於不寐在溫邪初起時屬邪實每多不寐或夜夢紛紜皆譫妄之漸也視邪之輕重酌與神解太極清之至於病彼不寐又屬腎陰不交心陽宜六味地黃合酸棗仁湯加減仍有痰熱侵犯肝膽當以溫膽加連或因微勞不寐硃砂安神丸隨證酌用循衣摸床撮空循衣摸床撮空三證兼見非大實即大虛之候邪實正虛者間亦有之如舌赤胎黃或舌黑起刺譫妄神昏脈數口渴見循衣摸床撮空者此實證也當用大劑雙解疊進為是如屢經攻下後六脈虛數舌淨無胎日晡執甚見循衣摸床撮空者此虛證也大劑生料六味地黃煎濃湯液日進數斗盡力救援或可百救一二如失下舌黑胎刺鼻燥厥逆當以大劑養陰化邪所謂壯水之主以制陽光此亦十中救半之候若夫老人虛人病後亡血後正氣虛極溫邪又盛見以上三證又當破格救援黃龍湯或朝服六味暮投雙解皆可總之三證兼見原屬敗證能審明虛實按證施治或可希僥倖於萬一也身冷身冷與惡寒不同惡寒是風寒外襲皮膚惡寒身冷是渾身肌肉皆冷在他證屬寒邪在溫證屬熱極如溫邪萌動外雖肢逆身冷惡寒作麻乃熱邪深伏鬱極內閉脈多沉伏參之內證必有咽乾口苦頭眩心煩手足心熱眼鼻噴火睡臥不寧尿赤煩悶舌赤舌乾等證萬不可認為寒邪誤投溫表香燥為害非淺當以神解合太極宣化伏邪使伏邪外達則厥回身熱更當消息邪之輕重酌與雙解涼膈等方治之如失下陰傷病邪困里亢極似陰即熱深厥深之旨渾身厥冷當審明舌色神脈酌定虛實施治若舌黑花燥舌本紫赤口渴咽燥及筋惕肉瞤神昏脈細等證又當大養陰液佐以攻邪之品以盡人事黃龍湯玉女煎加硝黃皆可選用至於初起夾寒夾表妄下以致邪陷身冷脈伏又當從溫化之法宜四逆合歸葛或真武諸方參酌之惟溫病無陰證姜附麻桂須宜慎用然寒邪若重自當隨證參酌不可拘滯也耳聾溫邪耳聾乃少陽邪熱上壅清陽時邪自三焦起三焦屬手少陽無論初終皆以神解合小柴胡清散少陽耳聾自愈如病後耳聾或腎水素虛又當以養陰壯水為主六味地黃湯緩緩圖治可也咳咳屬肺病時邪初起每多不咳即有之亦兼他邪如兼風脈浮兼水脈耎兼燥脈澀之類當於時邪方中看所兼何邪加藥抬之加兼風加前桔荊防兼水加茯苓半夏兼燥加桑葉麥冬更有平素陰虛乾咳無痰一染時邪咳必更甚蓋時邪屬火最易傷陰當於解時邪藥中加養陰之味至於溫邪病後多咳邪達皮毛周身必發疴發癢佳兆也清養肺金自愈甚有金被火灼咳至失音成痿成癰盡心救治痿宜復脈湯去薑桂癰宜瀉白散吐膿成癰多不可治又不可一概論也渴溫邪為熱症無有不渴間有不然或濕熱相兼或邪在血分或夾水飲或夾脾濕此外無有不渴者初起渴者宜察病邪之輕重渴甚則邪甚渴輕則邪輕雙解升降斟酌與之病後渴者當審明邪之有無渴為有餘邪不渴為無餘邪有餘邪則復甦合升降無餘邪只陰虛者參麥六味為主口苦口甘口苦口甘同為熱證口苦在傷寒為少陽證傷寒傳足時邪傳手手少陽三焦也時邪困伏三焦無有不口苦者當於神解方中倍加芩連知柏或三黃石膏湯選用至口甘為中焦熱鬱蓋脾胃屬土稼穡作甘熱邪薰蒸故甘味上溢於口此證每每舌多不燥或口不大渴萬不可用溫燥之藥於解時邪方中加芩連梔子可也齒燥溫邪齒燥有邪重陰枯之分邪重必兼口渴三黃石膏合雙解陰枯者或屢下後或素本不足非大劑六味地黃不可咽乾咽痛時邪咽乾乃熱淫上焦涼膈散清化湯若痛甚當視其有無結否無結以甘桔湯清化湯有結用涼膈散加牛子射干之類或起紫白泡是為乳蛾甚有急喉風急喉痹證旦發夕死夕發旦死不可不慎內治時邪雙解合甘桔法治之外證另延專司參看可也汗法溫證之汗與傷寒不同傷寒邪在三陽近於肌表每多汗解在前溫病邪伏三焦近於內臟每多汗解在後煞亦有不發汗而汗自出者或其人素本陽虛或濕盛往往有汗而熱仍不退者大約溫邪發汗宜辛涼不宜辛溫所有應汗之證條列於左發熱惡寒無汗頭項痛背痛腰痛肩臂痛遍身肢節痛吐法吐法古制也今罕用之在溫病中如邪拒上焦喘滿者可吐痰湧膈上者可吐此外更有血結胃口水停心下及膈間飲證無不可吐成方具在特備於後以見古法之不可廢焉壯盛之人痰壅氣促脈滑胸高胸滿脈芤胸滿拒按以上用瓜蒂散吐之虛人參蘆吐之下法溫邪下法原為瀉熱而設本不拘於結糞之有無故下不厭早亦不拘於表證之解與未解即便當下蓋溫邪由里達表必裡氣通而表汗始得每有下至一二次或五六次甚至數十次者惟以邪淨而後已至於老人虛人正虛邪實又當隨證斟酌或兼扶正或兼養陰或用導法是又不可不知也應下諸證列左急下證舌乾舌強舌卷胎刺胎黑齒燥鼻煤胸腹滿痛狂沉昏身冷發熱汗多呃逆有氣鬱熱不可下者已列前條當下證舌赤舌黃譫語多言善忘頭脹痛煩躁渴飲便秘協熱下利熱結旁流緩下證舌胎淡黃小便短赤潮熱和法和者解也解去熱邪即謂之和仲景惟少陽有和法若溫病則和法多端不可枚舉而所用之藥有辛涼解熱者有養陰化邪者或補瀉兼施或寒熱並用化其剛暴平其炎裊無不謂之和至於熱在營衛者以辛涼之味和之熱在胸膈及腸胃者以苦寒之味和之至於熱入心包則牛黃紫雪種種皆和法也當和證寒熱往來盜汙咽乾頭眩胸脅滿渴耳聾小便黃嘔吐下利心下痛痞滿心悸大小便閉塞寒熱二便自利舌有胎形體瘦損舌有胎熱在營衛證身熱汙自出不惡寒反惡熱熱在胸膈證身熱反減咳嘔噦咽乾熱入血室譫語熱在腸胃便血便膿血熱在心包及心證癡狂沉昏多睡舌黑久不退補法溫邪屬熱原無用補而有屢經汗下必侍補而後愈者當消息陰陽虛處治之大抵時邪傷陰居多亦有陽虛者當斟酌施治今將陰陽虛證詳列於左補當陰證舌乾無胎舌黑憮胎耳聾目直視目不明服涼藥煩熱加盛服攻下藥胎更厚服下藥舌胎芒刺更甚身體枯瘦用利藥小便不通腰膝軟痿周身骨節痛不可移動多睡久熱不退當補陽證多冷汗汗出身冷經日不回小便清而多大便利清穀嘔吐用清熱開導藥更甚自利用清下藥更甚痞滿服正治藥而熱不退舌反淡白惡食四損四不足四損者大勞大欲大病久病也四不足者氣血陰陽也四損由人事四不足由天秉然四不足亦由四損而來如四損四不足之人復感溫邪正虛邪實極難施治攻邪則正傷養正則邪錮故補瀉兼施惟在臨證審明虛實如全局屬實內中有一二虛象可疑之處即當吃緊照顧其虛如全局俱虛有一處獨見實證更當諦視斡旋其實此抬病權衡也若夫表之而頭痛身痛更甚下之而痞滿倍增涼之而煩渴愈加此所謂大虛有盛候也急宜補之無疑尤當察之以脈如脈浮候盛大者當審其何部無力即是真虛處他部諸浮盛脈皆作假有餘看從而施治萬無一失以上四損四不足當以補瀉兼施為善又視明損之來由邪之輕重如人參敗毒散人參白虎湯黃龍湯竹葉石膏湯皆補瀉兼施之法也至於四不足亦由四損而來氣不足者少氣不足以息感邪雖重反無脹滿之形凡遇此證縱要去邪必以養氣為主人參敗毒散最妙血不足者面黃色晦唇口淡白雖宜攻利必以養血為光四物湯合神解散陽不足者肢冷體寒泄瀉夜甚口鼻氣冷受邪雖重反無身熱胎刺煩渴一遇此證不可攻利先溫補待其虛回實證全現然後以治實之法冶之陰不足者五液乾枯肌膚甲錯受邪雖重縱宜攻利必先養陰待其氣化津回邪多不治自退設有未退酌用清利不可早攻愈傷陰津為戒總之應補應攻存乎其人臨證斟酌耳三複何謂三複勞復食復自復也勞復因病後血氣未復勞傷精神以致夜熱作煩脈象虛數是證在藜藿之輩常任勤勞多無此復惟膏粱之人素處溫飽溺於酒色不必大作勤勞即偶然應酬動作起居及梳洗沐浴之類皆能致復輕者靜養自愈重者必大補氣血八珍養榮四君六味參酌陰陽虛實選用食復者舌胎黃厚右關脈滑輕者損谷自愈重者保和丸加消導如查麥枳實青皮之類若無故自復乃餘邪不盡如舌上仍有黃黑胎當酌用增損小柴胡加軍但溫病之後陰分易虛又當慎用加育陰之品為要邪儘自己急當培元甚有復至再三者惟斟酌病之虛實施治方為補瀉合宜不致偏弊誤人仁心仁術亦復何愧五兼十夾五兼者風寒暑瘧痢也十夾者痰水食鬱脾虛腎虛亡血疝心胃痛哮喘也吳氏辨之甚詳茲不復贅獨遺燥證如皮膚皺揭喉乾嚥痛等證當做喻氏清燥救肺或竹葉石膏湯加殭蠶化邪之品至十夾之外仍有夾陽虛陰虛二種如人素秉陽虛即冬日圍爐不覺其溫日啖薑桂不姚其熱若感溫邪當視何者為重何者為輕如陽虛之極邪伏之輕當以益陽為主透邪次之柴胡桂薑湯加殭蠶澤蘭若伏邪重極又當兼治大小復甦飲加薑桂總以邪之輕重為端倪甚者下之邪去又當固正又如陰虛者虛陽外越真陰內虧甚有一病即舌乾無津脈來數急以大劑參麥六味先救垂絕之陰佐以滌邪之品或透或下隨證斟酌至若受邪太重值此陰虛豈忍坐視不下或於大劑養陰之中合攻下之品以希僥倖於萬一可他風溫風溫一證乃天時亢燥火邪內郁風邪外伏證視發熱咳嗽咽痛面脹舌赤心煩甚則頭弦氣急所謂風溫上受瑞責肺胃治以清散梔豉湯荊防敗毒散加殭蠶牛子主之時毒時毒一證亦由天時厲氣風熱鬱於少陽陽明作時每多耳畔高腫輕則不熱重則惡寒發熱夾食者胸悶闔家大小每每傳染無遺雖屬輕恙不可忽視倘經敷過致邪不化或口腹不禁以致熱邪內陷為害甚酷治法亦主清散甚則兼下發腫時邪後面目肢體浮腫氣虛者脈耎無力補中益氣湯脾虛有水氣者小便不利四苓埋中食滯者心下痛保和丸發頤時邪病後耳後或項下或巔頂腫者此餘熱留於營血即頤毒也速用普濟消毒飲加荊防耳後加柴胡巔頂加羌活外以蔥水浴之不可敷貼恐致成膿致有他變發瘡發痿時邪後發瘡乃熱邪外達皮毛極佳之象清熱化邪自愈發痿乃榮血傷也吳氏養榮湯發蒸蒸乃餘邪留於陰分當看有無邪否如餘邪不盡仍當攻邪佐養陰之品神解復甦酌用如純無邪者方可養陰六味地黃為主索澤溫邪索澤之證多因失治或誤投香燥溫散之劑真陰受傷致邪難化多在病後其證身體枯瘦皮膚甲錯消索而不潤澤也皆緣陰液為熱所耗肌膚失其濡筋骨失其榮或證現潮熱咳嗽吐沫吐膿或脾憊不食漸漸羸瘦骨立而死若早進六脈地黃丸及吳氏諸養榮法兼潮熱者銀甲散血虛者全鱉膏肺損者百合固金湯或可挽回至於善後惟有薄滋味不助熱邪慎起居勿傷血氣不可徒恃藥餌以滋蔓延急發證夫證有緩急猶天地之有常變處常如和風甘雨證之和緩者然處變如狂風疾雨證之暴急者然觀於天地之常變而證之緩急思過半矣惟溫疫一證不同他證不循六經難以窺測故有緩急之殊緩發者多延時日用藥頗可消息惟急發者每每倉猝不及提防甚至朝為平人暮為病鬼雖有良工其如走馬之勢何是以業醫者當細心研究其於證之急者能早辨之不致夭人性命是即迴天再造之手也謹將急證情形略舉數則以匣閱者易於明白一早間發熱午即舌黑神識不清者增損雙解大劑疊進方能有救一陡然如醉如癡神情恍惚六脈全伏舌色紫赤肩脅胸背痛者邪伏最深趁此初萌先與神解合太極升降或敗盡加大黃滑石等藥俟邪勢向表可與販毒加梔豉人中黃或涼膈一初病即頭痛加破身痛如杖腰痛如折者即用神解敗毒九味羌活皆可一初病即神昏不語有似中風甚至手足抽掣半身不遂當其人平素必有痰火氣鬱之證與邪並作可與清化湯兼痰者可加白芥子萊菔子兼火者加酒炒熟大黃兼氣者加烏藥青皮野玉金或涼膈散一初病即狂妄不識人者急與敗毒加犀連大黃甚者雙解或涼膈加人中黃一陡然阻厥如氣厥氣阻脈象全伏神解清化四七選用舌紫赤者清化湯加白薇邪勢發作增損雙解散下之一小兒突然驚搐不醒少定又驚或一連數十次者參之舌乾舌赤舌黑頭重不立者即是溫病極重之候初起宜用清化湯加羚羊或珠黃散合加味太極丸沙痘常有此證宜用大無比散和加味太極丸藥用神解散加羌活大黃一婦人或壯熱神昏崩下不止者此邪熱入胞中舌必乾紅或黑或紫赤宜用神解散黃連解毒湯加生地一面色青縮者舌必紫赤胎或白黃口有臭氣或小便短赤脈或沉伏而數此邪伏極重初宜清化湯繼用增損雙解散一或登高而歌棄衣而走者舌必紫赤三黃石膏湯加大黃鐵落一無故吐血者脈或數大舌或紫赤抽薪飲清化湯加生地澤蘭歸芍一無故霍亂者舌色乾紅清化湯定中湯加蘆根若舌本淡舌苔白又宜藿香正氣散一下痢不止舌赤脈數者荊防敗毒加軍或雙解散此通因通用法也緩發證溫邪之急發者前條申明惟緩發者其始悠悠慼慼若無大苦現證與溫邪殊不相類醫者不察見病治病屢藥不效迨至旬日或半月後病邪陡然猖獗即成燎原之勢甚至熱邪內潰譫妄神昏舌刺呃逆循衣撮空厄證疊現斯時即有對證之藥極力救之雖鞭之長不及馬腹矣惟能早辯其證治其萌蘖或有兼夾先治兼夾使邪得外達正氣不傷庶可保全今將緩法證治列左俾業醫者熟習胸中不致臨證誤治斯為盡善盡美之道也一初起不熱惡寒時作時止舌苔白者荊防敗毒散舌白如膩粉者宜服達原飲藿香正氣散梔豉湯虛人人參敗毒散陰虛歸葛飲臨證選用一恍惚如醉如癡者舌或乾紅或咽乾口不渴或頭眩而不自知其苦者宜用神解散清化湯升降散消息之一惡食不渴如濕痰者而心內作煩舌尖泛紅者初起夾寒食者藿香正氣散加羌防芍芷之類俟寒食退再照溫例治之一咳嗽咽痛如風熱者參之脈數舌赤清化湯升降散甘桔湯加牛子薄荷一偶然失血一二口如內傷者一胸悶脅脹如氣鬱者一胃痛胸痛及肋脅肚腹痛有似氣逆夾寒者一嘔吐痰水如霍亂者一頭眩頭痛者一面色青黃飲食不為肌肉者一兼夾風寒舌先有澆白苔舌本或淡或紅伏邪發動舌必紅紫一兼夾暑濕舌或白膩或淨赤無胎一兼夾飲食舌胎粗厚口有穢氣舌本紅赤溫邪壞證紀略一溫邪失治變生腫脹喘滿者多死不治一溫邪初起精神異常者不治一溫邪萌作即身痛神昏肢逆脈伏面色晦滯變生倉猝一溫邪一病口臭噴人舌黑脈代者死一溫邪初病腰痛身疼脈伏神昏咽燥不語者乃邪閉之候死期最速一溫邪失治久延潮熱嬴瘦有似怯證者不治一溫邪失治熱久傷陰得能發瘡發疥者生婦人婦入溫證治法與男子異者經朋妊娠產後之別絆候適夾溫邪恰受血為邪遏多致腹痛脹滿治溫法中加桃仁紅花元胡丹皮鰲甲之類經候過去血室空虛邪因乘入多致譫妄舌黑神昏潮熱又當以增損小柴胡加養陰之品如患溫時經自行熱隨血泄只治其溫經行自已至妊娠之婦一受溫邪胎為熱傷勢在必下胎下母亦難全處此不妨向病家說明原委急當速徹其熱以希僥倖往往如此施治不但胎不下墮而反安然無事岐伯曰有故無隕亦無隕也誠哉此言而吳又可又有懸鐘之喻於理更切要之此時下胎亦墮不下胎亦墮然下之胎墮母猶可救十中二三不下則母無生理胎亦為能獨存同一胎墮較之此善於彼自當盡力援之雙解散人增損大柴胡皆可選用更有妊婦一病舌即花紅或黑或燥此屬溫邪太重非大劑重劑不能破格救人惟減芒硝一味亦有胎死腹中又非硝不能下也尤宜向病家中明再用勿致胎謗為要至於幸與不幸天命也人事不可不盡也若產後受邪較胎前更難施治緣氣血早虧溫邪直入難化此時攻不可補亦不可惟審明證候以固本為主去邪佐之邪輕大小復甦神解合四物邪重複蘇為主攻邪如升降太極至於放手攻利則不可若果邪熱深重一病神昏舌乾勢有燎原之危又非大劑涼下不能有濟或兼扶元或佐育陰總俟臨證採酌攻補得宜庶為美善兼盡小兒小兒溫證與大人異者肌膚柔脆臟腑嬌嫩陰常不足陽常有除一受溫邪兩陽合併多致抽搐似驚實非驚也緣溫乃熱邪最易傷陰陰傷血燥風自內生是以劄眼搖頭吐舌撩唇胎黑鼻煤渴飲氣促人事昏沈以上種種現證溫病常有而驚證實無也若作驚治萬無一生照濕熱例治十全八九予一見此證當以加味太極丸紫雪合神解散加犀羚膏連獲效如晌此等證尤易驚駭惑人病家倉皇之際每招無師之嫗一見如此光景即以衣針挑放偶有見效以為應手居奇殊不知內經原有刺穴瀉熱之旨然而倉皇之時得此稍安人心尚屬可嘉間有不然之人身帶無名之藥重價售服反謗正治之非而世之病家相沿受惑者比比縱有明哲之輩多易墮其術中良可悲夫不思驚證從無鼻煤胎黑等證以此為辨萬不失一
