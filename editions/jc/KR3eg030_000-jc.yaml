body:
  text: 自序軒岐來無溫疫之書張長沙為千古傷寒之祖而溫症略載數條而已至河間書出而溫症始有所宗宋以來溫症局方慨宗河間雙解法明喻嘉言從傷寒諸論髮長沙未發之旨然尚論篇究非溫症專書吳又可始著溫疫論創邪在募原之說詢乎元燈獨得矣我朝諸名家各執一見以補偏救弊究不外河間三焦立論益以吳氏諸成法而已吾鄉戴麟郊先生復廣其論分汗吐等法為六門及諸雜症條分縷晰開後人無數法門茲祖其意略附以溫疫所受之原及諸名家所論與夫似溫症而實非溫症等法匯為一冊敢云指南之鑑然其中一二心得之處未必不可補前人所未逮而為青囊家之一助也靜氏自序於藥書艸堂
