body:
  text: 卷三神解散溫病初覺僧寒體重壯熱頭痛四肢無力偏身痠痛口苦咽乾胸腹滿悶者此方主之白殭蠶酒炒一錢蟬蛻五個神麯三錢金銀花二錢生地二錢木通車前子炒研黃芩酒炒黃柏鹽水炒黃連桔梗各一錢水煎去渣入冷炒黃酒半小杯蜜三匙和勻冷服此方之妙不可殫述溫病初覺但服此藥俱有奇驗外無表藥而汗液流通里無攻藥而熱毒自解有班疹者即現而內邪悉除此其所以為神解也清化湯溫病壯熱憎寒體重舌燥口乾上氣喘吸咽喉不利頭面猝腫目不能開者此方主之白殭蠶酒炒三錢蟬蛻十個金銀花二錢澤蘭葉二錢廣皮八分黃芩二錢黃連炒梔連翹去心龍膽草酒炒元參桔梗各一錢白附子泡甘草各五分大便實加酒大黃四錢咽痛加牛蒡子炒研一錢頭面不腫去白附子水煎去渣入蜜酒冷服其方名清化者以清邪中於上然而能化之以散其毒也芩連梔翹清心肺之火元參橘甘清氣分之火膽草清肝膽之火而且沈陰下行以瀉下焦之濕熱殭蠶蟬蛻散腫消毒定喘出音能使清陽上升銀花清熱解毒澤蘭行氣消毒白附散頭面風毒桔梗清咽利膈為藥之舟楫潤藏腑酒性大熱而散能引諸涼藥至熱處以行內外上下亦火就燥之意也其中君明臣良佐使同心引導協力自使諸證悉平矣芳香飲溫病多頭痛身痛心痛脅痛嘔吐黃痰口流濁水涎如紅汁腹如圓箕手足搐搦身發斑疹頭痛舌爛咽喉痹塞等證怪怪奇奇不可名狀皆因肺胃火毒不宣抑鬱而成治法急宜大清大瀉但有氣血損傷之人遽用大寒大苦之劑恐及轉閉塞而不達是害之也此方主之其名芳香者以古人元旦汲清泉以飲芳香之藥重滌穢也元參一兩白茯苓五錢石膏五錢蟬蛻全十二個白殭蠶段炒三錢荊芥三錢天花粉三錢神麯炒三錢苦參三錢黃芩二錢陳皮一錢甘草一錢水煎去渣入蜜酒冷服達原飲檳榔二錢厚朴一錢草果仁五分知母一錢黃芩一錢芍藥一錢甘草五分本方加羌活一錢柴胡一錢葛根二錢即三消飲九味羌活湯羌活防風蒼朮各錢五分白芷川芎黃芩生地甘草各一錢細辛五分加生薑蔥白煎藿香正氣散藿香一錢大腹皮五分紫蘇一錢甘草五分桔梗一錢陳皮八分茯苓二錢白朮厚朴半夏曲各一錢白芷五分加薑棗煎梔豉湯豆豉梔子等分本方加蔥一握名蔥白香豉湯莉防敗毒散荊芥防風枳殼桔梗柴胡前胡茯苓甘草羌活獨活川芎薄荷各等分加生薑煎本方去荊防加人參名人參敗毒散本方加厚朴陳皮殭蠶蟬蛻藿香名消風敗毒散普濟消毒飲黃芩酒炒黃連酒炒各五錢玄參甘草桔梗柴胡陳皮牛蒡板藍根馬勃連翹薄荷各一錢殭蠶升麻各七分本方加蟬蛻梔子酒大黃蜜酒即增損普濟消盡飲歸葛飲當歸葛根等分防風通聖散大黃酒蒸芒硝防風荊芥麻黃炒梔白芍妙連翹川芎當歸薄荷白朮各五錢桔梗黃芩石羔各一兩甘草二兩滑石三兩加薑蔥煎增損雙解散溫病主方溫毒流注無所不至上干則頭痛而腫注於皮膚則斑疹瘡瘍壅於腸胃則毒利膿血傷於陽明則腮臉腫痛結於太陰則腹滿嘔吐結於少陰則喉痹咽痛結於厥陰則舌卷囊縮此方解散陰陽內外之毒無所不至矣白殭蠶酒炒三錢全蟬蛻十二枚廣薑黃七分防風一錢薄荷葉一錢荊芥穗一錢當歸一錢白芍一錢黃連一錢連翹去心一錢梔子一錢黃芩二錢桔梗二錢石膏六錢滑石三錢甘草一錢大黃酒浸二錢芒硝二錢水煎去渣充芒硝入蜜三匙黃酒半酒杯和勻冷服慄山曰溫病本末身涼不渴小便不赤脈不洪數者未之有也河間以傷寒為雜病溫病為大病特立雙解散以兩解溫病表裡之熱毒以發明溫病與傷寒異治之秘奧其見高出千古深得長沙不傳之秘且長沙以兩感為不治之證傷寒病兩感者亦少一部傷寒論僅見麻黃附子細辛湯一證惟溫病居多以溫病咸從三陰發出三陽乃邪熱亢極之證即是兩感惜長沙溫病方論散佚不傳倖存刺五十丸穴一法惟河間雙解散解鬱散結清熱導滯可以救之必要以雙解為第一方信然予加減數味以治溫病較原方尤覺大驗惟麻黃春夏不可輕用古方今病不可過執也所以許學士有云讀仲景之書學仲景之法不可執仲景之方乃為得仲景之心也旨哉斯言河間雙解三黃俱用麻黃仍是牽引叔和書說蓋溫病熱鬱自里達表亦宜解散但以辛涼為妙涼膈散連翹二錢大黃芒硝甘草各四錢黃芩炒梔薄荷各一錢竹葉三十片蜜煎去渣服加味涼膈散溫病主方慄山曰余治溫病雙解涼膈愈者不計其數若病大頭瓜瓤等溫危在且夕數年來以二方救活者屈指以算百十餘人真神方也其共珍之白殭蠶酒炒三錢蟬蛻全十二枚廣薑黃七分黃連二錢黃芩二錢梔子二錢連翹去心蒲荷大黃芒硝各二錢甘草一錢竹葉三十片水煎去渣沖芒硝入蜜酒冷服胸中熱加麥冬心下痞加枳實嘔渴加石膏小便赤數加滑石滿加枳實厚朴連翹荷竹味薄而升浮瀉火於上苓連梔姜味苦而無氣瀉火於中大黃芒硝味厚而鹹寒瀉火於下殭蠶蟬蛻以清化之品滌疵癘之氣以解毒用甘草者取其性緩而和中也加蜜酒者取其引上而導下也升降散溫病亦雜氣中之一也表裡三焦大熱其證不可名狀者此方主之如頭痛眩量胸膈脹悶心腹疼痛嘔噦吐食者如內燒作渴上吐下瀉身不發熱者如憎寒壯熱一身骨節痠痛飲水無度者如四肢厥冷身涼如冰而氣噴如火煩躁不寧者如身熱如火煩渴引飲頭面猝腫其大如斗者如咽喉腫痛痰涎壅盛滴水不能下咽者如遍身紅腫發塊如瘤者如斑疹雜出有似丹毒風瘡者如胸高脅起脹痛嘔如血汁者如血從口鼻出或目出或牙縫出毛孔出者如血從大便出甚如爛瓜肉屋漏水者如小便澀淋如血點滴作疼不可忍者如小便不通大便火瀉無度腹痛腸鳴者如便清瀉白足重難移者如肉瞤筋惕者加舌卷囊縮者如舌出寸許絞擾不住音聲不出者如譫語狂亂不省人事如醉如癡者如頭疼如破腰痛如折滿面紅腫目不能開者如熱盛神昏形如罪人哭笑無常目不能閉者如手舞足蹈見神見鬼似風癲狂者如誤服發汗之藥變為亡陽之證而發狂叫跳或昏不識人者外證不同受邪則一凡未曾服過他藥者無論十日半月一月但服此散無不輒效白殭蠶酒炒二錢全蟬蛻去土一錢廣薑黃去皮三分川大黃生四錢秤准右為細末各研勻病輕者分四次服每服重一錢八分二釐五毫用黃酒二匙蜂蜜五錢調勻冷服中病即止病重者分三次服每服重二錢四分三釐三毫黃酒三匙蜜七錢五分調勻冷服最重者分二次服每服重三錢六分五釐黃酒二匙蜜一兩調勻冷服一時無黃酒稀熬酒亦可斷不可用蒸酒胎產亦不忌煉蜜丸名太極丸服法同前輕重分服用蜜酒調勻送下慄山曰溫病總計十五方輕則清之神解散清化湯芳香飲大小清涼散大小復甦飲增損三黃石膏湯八方重則瀉之增損大柴胡湯增損雙解散加味涼膈散加味六一順氣湯增損普濟消毒飲解毒承氣湯六方而升降散其總方也輕重皆可酌用察證切脈斟酌得宜病之變化治病之隨機應變又不可執方耳按處方必有君臣佐使而又兼引導此良工之大法也是方以殭蠶為君蟬蛻為臣姜委為佐大黃為使米酒為引蜂蜜為導六法備俱而方乃成竊嘗考諸本草而知殭蠶味辛苦氣薄喜燥惡濕得天地清化之氣輕浮而升陽中之陽故能勝風險濕清熱解鬱從治膀胱柑火引清氣上朝於口散逆濁結滯之痰也其性屬火兼土與木老得金水之化僵而不腐溫病火炎土燥焚木爍金得秋分之金氣而自衰故能闢一切怫鬱之邪氣夫蠶必三眠三起眠者病也合薄皆病而皆不食也起者愈也合薄皆愈而皆能食也用此而治閤家之溫病所謂因其氣相感而以意使之者也故為君夫蟬氣寒無毒味鹹且甘為清虛之品出糞上之中處極高之上自甘風露而已吸風得清陽之真氣所以能祛風而勝濕飲露得太陽之精華所以能滌熱而解毒也蛻者退也蓋欲使人退去其病亦如蟬之脫然無恙也亦所謂因其氣相感而以意使之者也故為臣薑黃氣味辛苦大寒無毒蠻人生啖喜其祛邪伐惡行氣散郁能入心脾二經建功闢疫故為佐大黃味苦大寒無毒上下通行蓋亢甚之陽非此莫抑苦能瀉火苦能補虛一舉而兩得之人但知建良將之大勳而不知有良相之碩德也故為使米酒性大熱味辛苦而甘令飲冷酒欲其行遲傳化以漸上行頭面下達足膝外周毛孔內通藏府經絡驅逐邪氣無處不到如物在高巔必奮飛沖舉以取之物在遠方及深奧之處更必迅奔探索以取之且喜其和血養氣伐邪辟惡仍是華陀舊法亦居蘇之義也故為引蜂蜜甘平無盡其性大涼主治丹毒斑疹腹內留熱嘔吐便秘欲其清熱潤燥而自散溫毒也故為導蓋蠶食而不飲有大便無小便似清化而升陽蟬飲而不食有小便無大便以清虛而散火君明臣良治化出焉薑黃辟邪而靖疫大黃定亂以致治佐使同心功績建焉酒引之使上行蜜潤之使下導引導協力遠近通焉補瀉兼行無偏勝之弊寒熱並用得時中之宜所謂天有覆物之功人有代覆之能其洵然哉是方不知始自何氏茲改分兩變服法名為賠賑散用治溫病服者皆愈以為當隨賑濟而賠之也予更其明曰升降散蓋取殭蠶蟬蛻升陽中之清陽薑黃大黃降陰中之濁陰一升一降內外通和而雜氣之流毒頓消矣又名太極丸以太極本無極用治雜氣無聲無臭之病也予用此散救大證怪證壞證危證得愈者不可數計更將此方傳施親友全沽甚眾可與河間雙解散並駕齊驅耳名曰升降亦雙解之別名也加味太極丸小兒溫病主方凡治溫病皆可隨證酌用白殭蠶二錢酒炒全蟬蛻去土一錢廣薑黃三分川大黃四錢天竺黃一錢膽星一錢冰片一分加西牛黃二分更妙右七味秤唯為細末糯米濃湯和丸如芡實大冷黃酒和蜜泡化一丸涼服薄希熬酒亦可大柴胡湯柴胡一錢半夏薑汁炒一錢半黃芩二錢白芍一錢枳實麩炒一錢大黃酒浸二錢生薑二錢大棗一枚水煎服增損大柴胡湯溫病熱鬱腠理以辛涼解散不至還里而成可攻之證此方主之乃內外雙解之劑也柴胡一錢薄荷二錢陳皮一錢黃芩二錢黃連一錢黃柏一錢梔子一錢白芍一錢枳實一錢大黃二錢廣薑黃七分白殭蠶酒炒三錢全蟬蛻十個嘔加生薑二錢水煎去渣入冷黃酒一兩蜜五錢和勻冷服小柴胡湯柴胡一錢黃芩二錢半夏二錢人參一錢甘草炙一錢生薑二錢大棗二錢水煎溫服本方加殭蠶蟬蛻即增損小柴胡湯加味六一順氣湯殭蠶二錢蟬蛻一錢大黃二錢芒硝柴胡黃連雲港白芍各一錢甘草五分厚朴枳實黃芩各一錢蜜導法用蜜熬如飴捻作挺子摻皂角末乘熱納穀道中或用豬膽汁醋和以竹管插肛門中將汁灌入頃當大便名豬膽汁導法調胃承氣湯大黃酒浸三錢芒硝三錢甘草炙二錢水煎服養榮承氣湯知母當歸芍藥生地黃大黃枳實厚朴各一錢加姜煎解毒承氣湯殭蠶二錢蟬蛻一錢黃芩黃連黃柏梔子枳實厚朴各一錢芒硝一錢五味消毒飲金銀花三錢野菊花蒲公英紫花地丁紫貝天葵子各一錢二分火齊湯即三黃湯黃柏黃芩黃連等分三黃石膏湯石膏兩半黃芩黃柏黃連各七錢梔子三十個淡豉各二合本方去麻黃加殭蠶蟬蛻薄荷梔子等分入蜜酒服即增損三黃石膏湯三黃瀉心湯湯液論有黃芩保命集有甘草大黃川黃連以麻沸湯漬之須臾絞去滓溫服竹葉石膏湯竹葉二錢石膏四錢麥冬去心二錢半夏二錢人參一錢甘草炙一錢生薑二錢粳米二錢水煎溫服白虎湯石膏生八錢知母三錢甘草生