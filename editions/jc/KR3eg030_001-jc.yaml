body:
  text: 卷一引錄孫真人論溫一則孫真人曰易稱天地變化名正性命然則變化之跡無方性命之功難測故有炎涼寒燠風雨晦冥水冒妖災蟲蝗怪異四時八節種種施化不同七十二候日月運行各別終其晷度方得成年是謂歲功畢矣天地尚如此在人安能無事故人生天地之間命愛莫能助遭際時有否泰吉凶悔吝苦樂安危喜怒愛憎存忘憂畏悶心之慮日有千條謀身之道時生萬計乃度一日是故天無一歲不寒暑人無一日不憂喜故有天行溫疫病者即天地變化之一氣也斯蓋造化必然之理不得無之故聖人雖有補天之極參天之德而不能廢之而能以道御之其次有賢人善於攝生能知撙節與時推移亦得保全天地所生之物以心備之命曰知方知方則病無所侵矣然此病也俗人謂之橫病多不解治皆曰日滿自差以此致枉者天下大半凡始覺不佳即須救療迄至於病愈湯食競進折其毒勢自然而差必不可令病氣自在恣意攻入拱手待命斯為幸矣溫證正名論內經曰氣合而有形因變以正名故病必先名正而後言順如傷寒病名實懸殊漢張仲景專究傷寒其書以傷寒立名詳列六經諸證然後治法並然不亂所謂名正言順也至溫證物附見其名而未詳論其治以其書本為傷寒設非為溫證設也後人不察遂以溫病為傷寒因以傷寒之法治溫病其妄久矣惟劉河間治溫獨出手眼為功甚鉅惜仍附入傷寒門中未正其名崑山王安道先生受業於朱彥修著溯洄集二十一篇始言溫病不得混稱傷寒發明溫病脈右盛於左由怫熱在內雖間見表證而里證為多法當治裡熱為主而解表兼之亦有治里而表自解者於是溫病之名始正厥後喻氏嘉言著溫病語錄言溫病熱自內出經氣先虛雖汗之多不解反復申明不可汗之禁以為發汗死者醫知殺之也張氏璐玉因之論傷寒自氣分傳入血分溫病由血分發出氣分並申明伏邪自內達外最忌辛溫發散於是溫病之旨漸暢惜喻氏議論太繁未免蕪而寡當而張氏仍雜入傷寒條例亦覺擇焉未精至若吳又可論邪伏膜原創達原三消等法吾鄉戴麟郊先生復廣其說增入色脈兼夾諸條立法甚精但二書惟主膜原溫從濕化之義僅能治濕溫之病不能治三焦溫熱之邪近時楊吾慄山寒溫條辨一書薈萃前言折衷理要辨明溫病與傷寒異受治法各殊立論以清邪中上焦濁邪中下焦及溫病由血分發出氣分諸說為溫病發受之原遵內經熱淫之旨參河間通聖之義變為增損雙解諸方其說似創實因其法似奇實正溫病一證乃得名正而治詳矣迄今遇溫病用其法十全八九或疑膏黃硝石過涼易於冰伏不知吳方本為火化之病而立非可概治他病也如紀曉嵐先生筆記云乾隆癸丑春夏間京師多疫以張景岳法治之十死八九以吳又可法治之亦不甚驗有桐城一醫以重劑石膏治馮鴻膚星實之姬見者駭異然呼吸將絕應手輒痊踵其法者活人無算有一劑石膏用至八兩一人服至四斤者雖劉守真之原病式張子和之儒門事親專用寒涼亦未敢至是可知病隨氣發治隨病更經曰必先歲氣母伐天和醫者能推其運氣正其病名施其治療無不可效茲特述其大略因名曰溫證下名云溫證匯海論百川匯於海海也者匯百川於一源也如溫證自靈素以下歷代名賢各有著述惜乎皆混入傷寒中求其類聚於一源者多不概見於是遍集諸書以求歸宿粵稽內經熱病刺熱等論井井有條至為詳備此溫證之發源也秦越人著八十一難經云傷寒有五溫病附於其中仲景傷寒論云太陽病發熱而渴不惡寒者為溫病所以提綱列目正見溫病之治不同於傷寒而後入轉因此混寒溫為一門考史記倉公治熱病用火齊湯火齊湯者三黃湯也是溫病宜涼不宜溫主裡不主表前乎仲景已有成法矣後賢如子和東垣專理內傷丹溪方矯局方溫補之非子和發明瀉南補北之義其書皆有功醫學而於溫證未有定論河間涼膈雙解諸方識超千古惜仍附入傷寒未特成一書以垂世立教迨王安道先生溯洄集始辨明寒溫燦若列眉後此喻嘉言尚論篇云溫暑濕熱之氣交互結蒸人在其中無隙可避病者當之魄汗淋漓一人病氣足充一室況於聯床並榻沿門合境種種惡穢人受之者親上親下各從其所類謂大頭捻頸撲瓤楊梅溫名狀不一又論東南地氣卑濕溫邪易受其溫病語錄一書論之尤詳吳又可獨抒心得發明溫萬之氣自口鼻入膜原特製達原三消諸方祛穢逐邪麟效戴氏而廣之其法更備長洲張氏璐玉著有醫通纘緒二論言溫病慎勿誤認傷寒而與表藥發汗不惟不解其熱轉變危殆治法當從雙解涼膈諸方兩解表裡以上各家雖流別稍殊而淵一譬之江淮河濟各擅波瀾慄山楊君因是溯流窮源而成條辨一收闡明邪伏三焦之義推河間雙解清化神解諸方以溫邪皆穢濁之氣用殭蠶蟬退清化之品以升之芒硝大黃猛勇之劑以蕩之其於治溫一法可謂集諸說之大成而包羅萬有總會眾流者也歷考方書惟張氏景岳偏於溫補治溫稍異諸家就其中論證立方非無可取他若柯韻伯溫暑指歸辨明冬不藏精及三氣合病之理葉天士溫熱論詳著通陽救陰及辨舌驗齒之法以及松峰說疫溫疫論類編廣入方言俱有微旨擬之支流曲澗皆可資灌溉之功而求其江洋浩瀚確乎為眾派之歸宿吾於慄山一書有觀海之歡焉狃於傷寒舊習者倘亦如河伯之旋其面目否乎溫證窮源論客有部於予曰溫證有源乎予曰有萬氣者溫證之源也夫萬氣自口自口鼻入中入三焦內通臟腑傳變不一乃天地間別有一種疵萬旱潦之毒氣非四時不正之常氣可比如內經冬不藏精春必病溫仲景太陽篇不惡寒之溫病以皮風濕濕猶是四時不正之常氣也惟萬氣則不然中人則人病中畜則畜傷且此隅病而彼隅安可知氣至則病氣不至則安試觀天之寒暑地之草木應候而生應候而更概可見矣平脈篇云清邪中上焦濁邪中下焦以此悟之邪中三焦又柯徵矣此溫證感受之源也蓋溫厲之氣多行於歲火太過之年流行一方民病相似邪之中人潛伏三焦無臭鬱極而發發時為病不一考評熱病論問有溫病者汗出輒復熱而脈躁疾狂言不能食病名為何對曰病名陰陽交交者死忝之今之治溫者往往強發其汗而邪不解其義顯然矣且邪伏三焦其病作之狀有可得而言者腎通心臟之陽又為胃之關門胃為交會之地兩陽合明病從其象故上焦受邪則胸悶壯熱背脹氣急中焦受邪則嘔吐脅痛口渴胃痛下焦受邪則二便或有或無或腹痛便血三焦俱受則頭痛如破腰痛如折一身不動往往昏憒反似虛寒有脈或沈伏如絲而病現壯熱煩渴者有舌或白滑而口乾咽燥者有便利而解膿血者外雖似寒內實大熱所謂亢極似陰若不細心研究誤投溫補禍不旋踵詳此治法慄山楊君先得我心寒溫條辨書出首列升降一方以一方化至十餘方輕則清之重則瀉之與吳氏達原變而為三消等方之義同但達原者因歲土太陰之政邪發膜原故立辛溫苦寒之法此濕土之正治也與三焦有名無形不同考中藏經云三焦者人之三元氣也號曰中清之府總領五臟六腑榮衛經絡內外左右上下之氣三焦通則內外左右上下皆通閉則皆閉可見溫邪困伏為病不一且是經為手少陽與命門相火為表裡故焦字從火義可思矣少陽又為半表半裡之境邪伏於此則出表入里任共所謂治法自當表裡兼治雙解法所為獨得其旨也假令伏邪初萌外為寒濕所困時俗治法往往投以辛溫發散一汗而表解解後溫邪繼發而仍守表裡常格每見變生倉卒若以治溫之法治之無不隨手而愈更有虛寒夾溫症得雙解病勢甫平虛寒隨見或以溫補之法偶爾成功遂大謗雙解之非此不明兼夾之故豈足以言經權也哉羊毛疹辯按羊毛疹之說倡於張陽和辯於沈萍如陽和以其法治病多所全活余及瘍醫濮韞良皆身受其益余踵其法以愈詩入何南園酬我以詩載在詩集萍如引證治準繩說鈴談往及御纂醫宗金載有羊毛疔形症治法井井有條且言後心有紅點隱隱如疹形則疔與疹相通固已明著其端矣萍如乃謂吳太醫未嘗經見此證因準繩載有前條不敢遺又不敢信不知金一書乃我皇上仁育物之心一時秉筆皆老師宿學所載證治確而為徵豈他書不足取信者比耶萍如引經文毛蟲屬木其氣臊之說以為羊毛疔證乃少陽經病木邪侮金髮於肺部膽中背俞之分獨不思疹亦肺病乎木邪侮金可以為疔獨不可以為疹乎若謂從前方書未見其名遂棄而不信則讀漢以前之書將謂世無痘症可乎至其詳列歲氣謂前此丁亥癸未未聞有此證則尤所謂刻舟劍視古今成一印板天地而造化為無權矣若羊毛之名原不必泥禮云羊曰柔毛或取毛之細弱有類於羊而名易大壯以羊象陽羊為兌象或如萍如所言少陽經病以羊象少陽或如萍如所言木邪侮金以羊象兌金於義皆有可通復何訾議耶若云蕎麥麵久搓能落毛髮則毛之一搓即出及必待針出及必待針挑而後見毛間五色長短不一者又何說耶總之陽和立法原有活人之功萍如著書亦為濟而設乃陽和既未能自暢其說而萍如又徒逞一已之私見而不酌事理之平其書中罨醬生毛之喻及小陽為樞樞闢而毛化樞滯而入死之論亦多可取獨其據說鈴指為災異則是理不足而以危語相恐嚇非君子立言之道也夫醫者意也當忝活法毋狃成心況金明載有羊毛疔例疹正可舉一反三何災異之有如晰微補化之羊毛沙脹金鏡錄集解之羊毛沙證種種皆可印證豈可盡指為災異耶金淺見寡聞未能博考方書惟准以情理忝以見聞覺疔疹皆屬溫邪重則為疔輕則為疹結則為疹治其溫邪而毛自化與金治疔之法相仿間或加以桃擦亦祖內經瀉熱之義於人亦何所損失醫乃仁術生命所關惟望二三同志毋狃於有此說而藉此居奇尤毋狃於無此說而直廢成法使可治之病橫羅夭枉虛心辨證按證立方務求切實功效而不從為嘵嘵口舌之爭則於張沈二君之心兩無所負並能推廣金明仁育萬物之功於無窮矣詎不足增醫林之光而為蒼生之福哉又按痧疹二字遍檢字學有疹無痧想痧字乃近世之方言也考疹者癮疹也皮外少起又疿病也與今所見之疹如雲頭如疙瘩如粟起如疿瘄頗與頗與字學相符多屬風熱鬱於手太陰肺足太陰脾困於里故腹痛散於表故搔癢雖曰微恙調治不當多成痼疾甚者閉悶即危可不慎與又考痧之形證每逢盛行之際比戶皆然患者身發壯熱咳嚏頻頻現形如霞如錦有輕有重者三日漸沒重者七日尚不能遽退閉者一二日即斃後渾身青紫有邪化不盡多歲月或羸疲潮熱或肌膚甲錯或咳吐膿血或牙齦破爛種種不一竟無一起良可悲夫昔賢論屬胎毒發自六腑於理未確予則謂天行疫氣使然今人肖形命名痧字與疹字義原可通況古人原有痧即是疹疹即是痧之說內經曰金位之下火氣承之明指熱邪鬱於肺胃膽中胸膺背俞之分以此悟彼羊毛溫疹可以類推矣治溫證當明氣運方隅高下人質強弱論嘗考歷肛名賢絕無一人源只內經溫病刺五十九穴以瀉熱一語而已未有湯藥治療也不知天地之大運偏陰偏陽數十折必一更轉如南北高下之不同水土剛柔之各異人質因之而強弱或逢大運君火則河間之涼膈通聖是其時也運轉寒水則醫貫全書錦囊之辛熱溫補中其病也或溫土之運吳氏之達原三消相火之運粟山之升降雙解皆在所必需至於風木燥金可以類推矣要之數君生不同時居不同方其書原俟後人對證採擇乃知劉氏乃大運君火之時大運有君火則必有寒水此時大運偏陽逾時又必偏陰惟是推之以運徵之以病驗之以藥則知氣運有偏勝而藥亦必有經權苟執前人印定之書心胸為其所滯而不通變則與癡人說夢有何異焉又五運六氣周甲而更隨運而轉偏陰偏陽孰寒孰熱自有定理而後人隨證之治所著之書寒熱不同補瀉各異前賢歷歷可稽猶有未經發明之處如大運六十年一更小運十二歲一轉靜揆其理大運六十一更乃定數也小運十二轉乃變數也定數可稽變數難察猶易卦之爻理難窮惟業醫者心領神會耳如陰厥陰風木之運則承上太陽寒水之運而來考之於經明之大運已轉風木而所現之證所施之法仍屬寒水厥後漸漸不應而以風木之法治之又如影響何也運雖按甲而上運之餘氣不能遽已譬如大水之後巨浪雖平細流未息直待本運轉正則天下之人咸知其為某運也是時英賢隨運著作書帙甫成尚未廣行孰料運又暗更人猶未覺據其書用其法施治罔當運之是賢又譏前非不知運氣循環周而復始逾數十年逢其運用書施治而無不應明乎此非書之偏也乃運之更也大運如此更有小運轉遷客氣加臨非神而明之鳥能洞悉業醫者更當心領神會發明溫熱傷寒不同斷斷不可混治簽署寒溫熱二證同受天地之氣為病咸云厲殺自古至今人相習而不察據其外證惡寒發熱頭痛身熱無不以傷寒為名皆混於象而不察其證執其常而不觀其變概名之曰傷寒孰知岐出多端豈可一律論哉且傷寒為病一日太陽二日陽明三日少陽次之三陰七日傳遍不再傳矣在表一汗而解在裡一下而解在胸一吐而解克有定期定證可據若溫熱則變化無常感受不覺莫可尋思其發也不循經次乘竇而作親上親下各從其類感之輕者即體虛之人照常疫治之亦隨手而愈受之重者即強壯之輩一病無不頭痛寒熱身體痠疼有似傷寒而誤以治傷寒之法治之強發其汗而汗反無轉增神昏胸悶胎刺舌黑譫妄呃逆等危致津液枯竭真陰內敗無生機也其尤重者一病即神識不清舌黑鼻煤肢冷脈伏有似虛寒醫者見此每每投以姜附參桂無不立斃要之辨症貴精雖外現寒象內兼一二熱象可疑之處即當細心詳究如咽乾口苦舌赤心煩氣噴如火坐臥不寧二便知少等證自當以裡熱為真外寒為假經所謂亢極似陰施治必須寒涼故辛溫之品皆為弋戟經又曰寒者熱之熱者寒之寒為陰邪治陰邪以陽勝麻桂姜附等湯是也溫屬陽邪治陽邪以陰勝三黃石膏雙解涼膈等方是也二證寒熱不同汗下各異斷斷不可混治大抵傷寒汗解在前溫證解在後傷寒不下厭遲溫證不下厭早此曷故也傷寒之邪中人肌表可一汗而解溫毒之邪中人內臟不但汗不能解即屢下尚不能敵其凶厲之鋒正如酷暑炎威燦石流金非大雨滂沱商飈頓起不能變火境為清涼化剛強為柔順夫然後天露降土膏潤萎草蘇人身亦然揆之以理天運為之近年以來冬無層水積雪之寒反多溫暖之天患傷寒者少病溫熱者多況東南之地陽氣常泄偶有風寒多屬感西北地高風冽多病傷寒可比間有不然五運交換寒暑更易有相火之運則必有寒水之年斯時南北氣運又不可同日語也苟明氣運更遷之理而為治病之大綱其於傷寒溫熱判若黑白了無余蘊矣治溫毒當與治痘毒同忝痘毒者父母情欲之火也溫毒者天地疵厲之火也同一火也為病各殊痘感未形之先發於既形之後必待天行疫氣擊而後發如石中之火不擊則不出也是疫為擊火之器火為發痘之原古人謂痘為溫疫之一端誠哉此言治痘法以升散攻利保存元化毒導邪外出為先尚有一事實上之規模不似溫毒有質皆傷如棗得霧即枯蟹得霧即死人中之無論老幼強弱一觸即病至其失治較痘之焦頭額爛胃腐腸實同一轍更有甚者毒閉不出如痘之折腰發班溫之膚紫衄血形異情同考之內經諸痛瘡瘍皆屬心火之旨為火言非專為痘言余以靜理忝之上古人情淳樸飲食淡泊即有七情六淫之火為害亦小不似今人腥膽適其口炙烙充其腹膠醪醇灌其腸嗜欲勞其精起居失其時一遇天行溫毒邪未中人而人以預損之軀早已招邪外人與內蘊之火兩相搏激其致病與痘相得天真之體尚稱完全溫欺殘傷之身誠難施治予一得之見請證高明治溫當以保元為要人身元氣猶大廈之棟梁柙壁結構層檐飛覆無不附此而出一遇溫邪如火沿焚即當撲滅庶馬粱不腐而廈不傾觀婦人懷妊患溫去其邪而胎蔭如故大可覺悟請以藜藿之夫少壯之輩論之年華方盛氣血方剛一受溫邪即當先行逐邪俾邪去正安不必保元而保元之意已寓其中矣嘗見世人拘泥者多融會者少一見患者溫邪萌作神疲體倦色晦無神多疑正不勝邪審人之強弱概以扶正化邪育陰化熱為主視為平穩每每因循失治變生倉卒殊不知溫毒酷厲敝人清神真實假虛最易滋惑急去其邪即是保元惟有真虛者為難一受溫邪如懦人招事不敢聲強當審明何臟虛損照四損不可正治條忝看先固其虛復治其邪斯為合法經所謂毋實實毋虛虛即此意也然而實者如棟梁大廈尚可撐持虛者比朽木頹垣無所倚恃斯時烈焰焚空為問救梁是務救火是務乎意欲保元而病邪不去將欲去邪而正氣先傷醫者處此每有無所適從之嘆焉然未嘗無法也曲直方圓畢歸繩墨善戰守出瞬息萬變將才古人謂用藥如用兵一補一攻一補三攻非無成法於邪盛之際而攻之攻邪不傷元氣於邪衰之候而補之補正無妨病邪斯為攻補兩得其宜不犯虛虛實實之弊即所謂保元之要說也然虛實之當辨豈獨為溫病一語設耶吳又可為治溫證千古一人溫熱一證自軒岐以下千百年來絕無一人專言此病者前已申明茲復何贅意猶未盡請再詳之夫靈素一書聖經也一言而包萬有傷寒一書聖文也一海而匯百川聖經即已發明傷寒溫病兩途長沙醫聖自必有文以闡經旨斷不能詳於傷寒而略於溫證也想因兵火之後傷寒一書尚出自散亡之餘溫證之文遺失殆盡無自追尋歟迨至吳又可能闢千古之案獨開生面自創自因發明邪伏膜原及論證剴切詳明治法井井俾後世業醫者得以問津謂非千古一人耶厥後戴氏廣其論說活人之功豈止億萬雖其立義僅詳濕溫一門慄山楊氏因其緒論推其氣運闡河間之奧義而治溫之法益詳然原其作始創立專書標明宗旨吳氏之功誠不可泯云溫病有表證無表邪論溫屬厲氣自口鼻吸入流布三焦越人云上焦在胃上口主納而不出中焦在胃中脘主腐熟水穀下焦在膀胱上口主分別清濁細繹經經文三焦雖有名無狀之腑而實總統於胃胃者五臟六腑之海主裡不主表溫邪自里達表故治溫諸家有下不厭早之說蓋在經謂之表邪在胃謂之裡邪溫病有里邪無表邪瑟傷寒表邪傳裡方為里邪者不同故當專治里邪或問溫病即無表邪焉有表證如太陽之發熱頭項痛陽明之目痛鼻乾眉稜骨痛少陽之脅痛耳聾寒熱口苦傷寒有之溫病亦有之何謂也予曰不然傷寒之表證皆表邪顯呈於外也故有表邪因有表證溫病之表證即里邪浮越於外也故有表證實無表邪又可吳氏所謂熱淫之氣浮越於某經即現某經之證者此也試以格物之理言之燃薪於一室煙必迷漫於當空人望其煙而指為煙不知煙之有其本也內經云有在其標而求之於本使治其標而忘其本不幾誤哉嘗見令之治溫病者一見發熱頭痛遂誤認表邪桂枝麻黃者為常例不但雙解涼膈不敢遽投即神解芳香亦不敢遽用皆緣辯證不明故致胎誤夫三焦總統於胃胃氣能敷布十二經而榮養百骸毫髮之間靡所不貫溫邪本厲氣耳浮越於經而現表證則有之謂表邪則斷斷無也問者曰唯唯自而又曰溫病亦有無表證者乎亦有兼表邪者乎予曰有無表證者溫邪內伏如窮凶巨寇埋伏之兵更為酷厲非嚴肅之師不能克濟至於兼邪而作而為表邪所困自當兼治其表如九味羌活湯荊防敗梔豉湯之類先解表邪再治溫病方為合法此溫病兼表邪則有之若謂溫病有表邪有表證則誤矣於是問者曰予今而此如知治溫病者不可誤認表邪而強發其汗治溫證當明五兼十更夾溫病兼夾不可不辨素無其證與溫邪合病為之兼素有其證與溫邪並病謂之夾是溫病為本兼夾為標若辨之不明未有不以標為本甚至治其標而忘其本者閱古方書惟麟郊戴氏有五兼十夾之說其意甚善惜乎略而不詳如五兼詳於風寒略於燥火主夾詳於本證略於陰陽茲於未備者補之煩冗者刪之使後之治溫病者凡遇兼夾之證胸有成竹不致岐路亡羊寧不為溫病中增一法門耶即以六淫論之暑必兼濕故夏傷於暑秋必病瘧夏傷於濕秋必病痢其所以為瘧為痢者夏之暑與濕相兼為患也至於夾證尤為明顯如內傷飲食外感風寒之類相併而為患也若不細為考覈徒講兼夾不究溫病誤矣即究溫病而不知兼夾更誤矣嘗見溫病有兼夾之證輕者必先治表後端治溫重者表裡兩急自當雙解若膠執解表在前無不貽誤誠可悼嘆果能明乎溫病兼夾治溫病不遺兼夾治兼夾無心溫病或先治兼夾或端治溫病或治兼夾而溫病漸輕或治溫病而兼夾自除庶幾溫病兼夾兩相發明而於治濕病也燎若指掌矣舌胎論舌胎之說肇自長沙然所論者只白胎一種其餘概未之及後人金鏡錄觀舌心法傷寒舌諸書立說甚詳皆傷寒舌胎之梗概也若溫病熱邪自里達表舌胎尤不可忽蓋傷寒一證自表入里六經傳變一病舌無不白可一汗而解其不解者寒鬱化熱舌胎必由白而黃而黑邪已傳腑自當攻下有一定之規若溫病則不然三焦受邪不循經絡傳變不一且少陽為三陽之樞出表入里任邪所為即有發熱頭痛之表證實無在經之表邪書所謂有表證無表邪誠至言也既無在表之邪是以有一病即黃即黑之舌胎自當有急攻急下之湯藥以救燃眉若泥傷寒之說必侯邪入胃腑胎轉黃者方可攻下恐病溫者腸胃腐爛早赴九泉矣至於白胎一種更細察其胎雖白燥而無津此白砂胎中必夾濕至死不黃或白而潤舌本必赤或有紅點如古所謂蟲碎舌法當清解不宜溫燥若誤認外感而投辛溫之劑害不旋踵其他諸舌種種不一而溫邪進退之機大都不出乎此今急為詳辨願同志者早具燃犀之目俾胸有把握亦如舟師之有舵庶矣操縱在我所往無不利也又如陶節庵傷寒六書三十六舌可謂至詳至備矣但傷寒之舌表邪傳裡寒化為熱方現出黃胎不似溫病邪自里達表一病即現黃胎以此為準萬不失一至愈下而舌胎愈黑愈燥者屬陰虛潤者屬陽微皆死候也更有舌赤無胎如太陽初出之關閃灼不定胃中陰陽皆絕萬無生理以上陰虛陽微二證欲百中救一陰虛者麥味地黃湯合養陰法陽虛者朮附合理陰法補其未逮也望色論望色重於切脈內經云上古使僦貸季理色脈而通神明又云能合色脈可以萬全盡脈動於內其一是甚微色現於外其象至顯且有諸內必形諸外可一望而知之如肝熱左頰先赤肺熱右頰先來脾熱鼻赤賢熱頤赤心熱額赤之類觀於某部之赤即可以識某臟之熱矣推而論之青則為寒黃則為濕黑者多實白者多虛溫病屬熱無不面赤甚者如大醉後如暑天遠遊面多繃脹紅赤大的氏溫病初起天庭必晦溫病將愈鼻準先光垢暗不堪者病邪必重鬆緩微潤者病勢漸輕吳又可謂望之可憎如油膩如煙熄滅熏為溫病之色誠至言也予靜忝至理溫病者厲氣也神者氣之餘色者神之標亢厲之氣內受而為病外現而為色理固然也臟腑精華畢陳於麵人能望面部之色以知臟腑之病而不能望臟腑之色以決生死之機彼洞見臟腑一望而決生死者大部觀其外而知其內使今之人理色脈而通神明以為治病的把握胸有成竹奏效可以十全若從講病情不知望色茫然以溫病為傷寒將使病者含冤於地下矣昔晉景公有疾醫緩視之曰二豎入膏肓不可為也醫緩洞見臟腑寧非合色脈而忝詳耶從古有諸內必形諸外觀其外可知其內能於色脈而忝詳之斯不獨為治溫病之大綱即以為治他病從大綱也可切脈論切脈一道古人置之四診之末何也蓋脈之理易於矇混難於顯明如診浮脈有力為風熱無力為血虛一虛一實千里毫釐必得望其色聞其聲問其情而後忝之以脈方得病之真諦即以浮脈論之有力為風熱外必有聲重咳嗽洒洒惡寒之證無力為血虛內必有煩熱身痛逆蒸蒸自汗之證若溫證之脈溯洄集始略示其概而尤有難辨者初起時邪伏血分脈多沉伏有似微弱予初診此疾投以辛溫發散每多不效後細忝吳戴之論又得寒溫條辨之書見其申明運之更張闡發溫疫之源流變辛散為清解變辛散為清解變溫燥為涼下尊內經熱淫之旨仿河間攻下之法予胸次為之頓開可見醫學無窮難以拘執遂細心研究守用其法無不獲效始知初病微弱之脈乃伏脈也非沉脈也及惡寒作麻乃陽氣內閉非表寒也投以溫劑所以不效者此也迨至伏邪漸潰由里厲害表病勢更張脈象變態或數或洪或長或大斯時失治致真陰受傷則脈反細數甚者肢逆脈微陰竭於內熱灼於中外則目瞪口張唇焦黑神昏不語內則臟腑焦腐縱有良工莫可如何今特序其大略如此非謂脈之不足憑正謂診脈者之宜先審證而知所通變也治溫當分老幼不可棄其老為不治三春旱草得雨滋榮殘臘枯枝雖灌弗澤此言少易治而老難治試為罕譬而喻然亦有不盡確者如三春旱草得雨滋榮之句乃少壯之輩失治之候熱邪燔灼煎熬津液能以大劑苦寒之藥治之即可汗出而愈信如三春旱草一雨而欣欣向榮惟以殘臘枯枝擬老人之氣血既衰雖灌溉不能耐稍回其潤則僅可以論本證而在溫證則或有不然假使稟先天之厚處和順之境得後天之養雖古稀耄耋感受溫邪乘其初萌一鼓潰之真陰元俱不受傷何敗之有即有勞碌衰頹之輩豈忍棄而不救古人置有黃龍湯等法原可破格治療至幸與不幸天也命也非醫之過也溫斑點失治致變不咎誤而咎藥辨溫病一證原屬火邪認明證候急早清解無不獲效此治溫熱之法非杜撰也奈何人拘執不化多致因循誤事反咎清解之非動云失表水伏誠可概也究其由揆其情蓋有四焉一曰病家二曰醫家三曰旁人四曰病者病家何以致誤嘗見稍通文墨之人自命知醫平居案頭置本草醫方數則逐日番閱見大黃稱為將軍石羔名曰白虎惴惴然者非一日矣及遇溫斑點即勢處凶暴畏雙解如蛇竭堅執不服甚至舌黑神昏無可如何之際強服不應以致危殆不曰自誤而曰藥誤此病家之通弊也醫家何以致誤如溫病極盛服下藥一二劑洶勢略平邪仍猖獗自當再行攻逐病家疑怯另延他醫或驚曰重劑傷元或駭曰涼藥水伏不審病情先存雌黃之見說前藥之非急易前藥或養陰或和解以為穩當殊不知溫毒燎原勢屬燃眉即急攻急逐尚未能滅其烈焰而反行和解致病者陰枯津竭而死不曰後藥之非而曰前藥之誤此同道中之積習也又如旁人或親或略明藥性見醫見藥強為辭說動曰如此藥斷不可服或曰寒涼太過服之必敗此時病家處驚疑之際心本無定又聞親月如此之言以為旁觀者清遂致停藥因而致停藥因而致敗敗後親朋仍不知己之誤而猶歸咎於藥誠可痛恨也更有病者素處膏粱或父母姑息藥不盡劑或喑換湯液陽奉陰違在醫前云藥已服完病未見減反責不力如此種種醫者抱屈何處伸耶治溫證不急去邪膠執養陰胎誤論溫病熱毒之邪薰灼臟腑為害最烈急早涼下乘其賊勢萌動羽翼未成使賊不能猖獗一鼓而先滅凶首不但賊勢易潰而城郭倉庫亦無受傷之處豈不萬全奈人不能見真守定視羔黃芩連如蛇蠍守養陰化邪為良方不知溫邪如火人身如釜津液如油煎熬臟腑勢不焦枯不已若不急抽其薪徒事揚湯止沸實與養癰無異更有扶正祛邪似屬穩當然此為正氣虛者立言非為邪氣實者立法如果體質素弱陰陽久虧或言不由衷後或亡血自當救虛為急養陰扶元之法所必需豈可一例論哉譬如空城遇寇必先措置糧響先實倉廒然後開門拒敵自無不利若溫病初起邪氣方盛急行攻逐使邪不傷陰傷元而養陰扶元之意即在其中倘遽投滋補是猶遺敵兵而資盜糧害莫大焉余歷此證十有餘年得心應手之處指不勝屈故不憚反復詳述誠以生命為至重也治溫證誤投辛溫香燥重竭真陰論病有正治有反佐正治者治寒以熱治熱以寒反佐者治寒病以涼藥為嚮導治熱病以溫藥為先鋒若溫病則治可反佐不可誤治更不可蓋溫病本屬陽邪治陽邪以陰勝則真陰不傷舍正治之法無弍策也若泥於古法或任意反佐真陰受傷終歸必敗更有甚者辛溫迭投香燥頻進或日事先防祛風發表或連投蒼樸燥濕溫中其尤甚者姜附香蔻種種溫燥不止一端是何異火上加油豈不益助其焰哉吾見舌乾起刺者有之舌赤如絳者有之脈象細數皮膚甲錯筋抽直視者又有之噫真陰已竭病者死矣問何以致此曰非溫燥藥之過乃治溫病者誤投之過也夫辛溫香燥應於寒濕之證原屬神丹用為溫病之方何殊戈戟此亦如羔黃芩連不宜於治寒而宜於治熱使治溫病者省心自悟無誤治之懲庶幾赫赫炎威頓變清涼福地豈不快哉溫證下不厭早有首尾宜下辯考內經治溫病刺五十九穴以瀉熱明乎溫病當以瀉熱為急後人因之而立下奪之法本即內經之意而變通之蓋溫熱內蘊津液受傷雖在初起之時即宜攻下萬勿泥傷寒先表后里之說昔賢謂溫病不不厭早誠至言也下之者使邪即出無停留之意故溫病服攻利之後必有水沫隨大解澼澼而出邪輕者色黃甚者色赤劇者色黑此即無形之熱邪下瀉原不拘於結糞之有無若必待痞滿實痛而始行之逐不亦晚乎其尤要者虛人實邪於攻邪之中必視其何臟之虛照慶處為吃緊要著如邪勝於虛者先去其邪繼補其虛正虛於邪者先固其虛後攻其邪或先攻後補或先補後攻或一攻一補惟醫者圓通變化明體達用存乎其人非筆所能擊也至溫病之邪伏而後發不似風寒外感可一汗而已是以溫病投涼下之劑多有病勢猖獗昧者說為錯治每每更醫換藥致誤不知伏邪猶之伏匿之火揚之則焰起非大下疊下焉能勝此燎原之勢常有石羔用至數斤大黃用至數兩首尾不徹始獲全功者大抵溫邪傳變不一非一下即能淨盡古人原有如剝蕉心之喻其邪勢輕者一二劑即愈重者非疊下不效若畏藥峻猛怯不透下欲不至腐腸爛胃者幾希矣醫者惟見真守定方無妄治之虞孫真人曰膽欲大而心欲細其斯之謂與治溫邪首重涼下終或溫補及不宜妄下過下論溫邪一證屢經汗邪雖漸解而真陽自無不傷或其人素本陽虛濕盛或調養不善以致返復而證現面青寒熱食少便溏舌胎白滑脈來無力雖有熱象不得仍以前邪正治自當辨明陰陽虛處為吃緊關要如陽虛輕者香蔻六君補中益氣甚者參附理中兼陰虛者理陰為主純陰虛者六味為主餘邪不盡少加和邪之品方可救未中之危至下之不當謂之妄下下之無節謂之過下妄下由於辯證之明過下由於權衡之失度若辨證明晰如溫病兼表不宜妄下妄下則有引邪入里之戒胸積痞滿之危甚有夾濕夾痰陰陽素虧腸胃素弱以及老人虛人病後亡血後諸證自不當遽然攻下吾又見權衡失度者診治溫病惟守下法無分虛實莫辨陰陽愈下而舌胎愈黑甚至乾紅無津仍然肆行硝黃置養陰之法為無用或疊下而熱更增仍投雙解視和邪之方為無濟病緩藥急藥七病三病去元贏合扶元之功而不講且胎退熱輕病去而下藥不微陽虛陰敗病後而補劑不施賊去城空終歸罔濟過下之失又如此也甚矣溫病不宜妄下不宜過下稍一不慎而當下不下者轉得因以藉口可勿戒與然而妄下過下之害實同一轍惟臨證時神而明之存乎其人耳
